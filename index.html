<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>ClientOS — Crixy Ai</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060711;
  --bg2: #0b0d1a;
  --bg3: #10122a;
  --surface: #141728;
  --surface2: #1c1f38;
  --surface3: #242848;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --border3: rgba(255,255,255,0.15);
  --accent: #f8fafc;
  --accent2: #9ca3af;
  --accent3: #d1d5db;
  --accent-glow: rgba(255,255,255,0.24);
  --accent-glow2: rgba(255,255,255,0.12);
  --green: #10b981;
  --green-glow: rgba(16,185,129,0.2);
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --orange: #f97316;
  --teal: #14b8a6;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #4a5568;
  --text4: #6b7280;
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font: 'Inter', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --radius-lg: 24px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  --shadow-accent: 0 8px 32px rgba(255,255,255,0.24);
}
[data-theme="light"] {
  --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e8eef5;
  --surface: #ffffff; --surface2: #f8fafc; --surface3: #f1f5f9;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12); --border3: rgba(0,0,0,0.18);
  --text: #0f172a; --text2: #475569; --text3: #94a3b8; --text4: #b0bac9;
  --shadow: 0 4px 24px rgba(0,0,0,0.08); --shadow-lg: 0 8px 48px rgba(0,0,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{height:100%;-webkit-text-size-adjust:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{overscroll-behavior:none}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.aurora-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.07;animation:aurora-float 20s ease-in-out infinite}
.aurora-blob:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,#f8fafc,transparent);top:-200px;left:-100px}
.aurora-blob:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,#9ca3af,transparent);top:40%;right:-150px;animation-delay:-7s}
.aurora-blob:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,#d1d5db,transparent);bottom:-100px;left:30%;animation-delay:-14s}
@keyframes aurora-float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");opacity:.35}
#root{position:relative;z-index:1}
.app-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(11,13,26,0.97);backdrop-filter:blur(20px);border-right:1px solid var(--border);transition:width .3s cubic-bezier(.4,0,.2,1);z-index:50;will-change:width}
.sidebar.collapsed{width:64px}
.sidebar.collapsed .brand-name,.sidebar.collapsed .brand-sub,.sidebar.collapsed .nav-item span,.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-badge,.sidebar.collapsed .sftext{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:10px 0}
.sidebar-brand{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.brand-logo,.logo-frame{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#050505;border:1px solid rgba(255,255,255,.16);box-shadow:0 10px 28px rgba(0,0,0,.34),inset 0 0 0 1px rgba(255,255,255,.05);flex-shrink:0;overflow:hidden}
.brand-logo img,.logo-frame img{width:100%;height:100%;object-fit:contain;display:block;padding:4px}
.logo-frame-lg{width:84px;height:84px;border-radius:20px;margin:0 auto 16px}
.logo-frame-sm{width:32px;height:32px;border-radius:8px}
.logo-inline{width:18px;height:18px;border-radius:5px;background:#050505;border:1px solid rgba(255,255,255,.14);object-fit:contain;padding:2px;display:inline-block;vertical-align:middle}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--text);line-height:1.2}
.brand-sub{font-size:11px;color:var(--text3)}
.nav-section{padding:8px 8px 4px}
.nav-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:4px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .18s ease,border-color .18s ease,color .18s ease,transform .18s ease;will-change:transform;font-size:13px;font-weight:500;color:var(--text2);position:relative;white-space:nowrap;overflow:hidden;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(255,255,255,0.14),rgba(255,255,255,0.08));border:1px solid rgba(255,255,255,0.24);color:#e5e7eb}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(to bottom,var(--accent),var(--accent2))}
.nav-badge{margin-left:auto;min-width:20px;height:20px;border-radius:99px;padding:0 6px;background:linear-gradient(135deg,#fff,#cbd5e1);color:#050505;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--accent-glow)}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;flex-shrink:0;background:rgba(8,9,14,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700;flex:1;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow:auto;padding:24px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015)),var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease}
.card-sm{padding:14px 16px}
.card-hover:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-glass{background:rgba(20,23,40,0.6);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius)}
.stat-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;transition:all .3s ease}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.stat-card::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;opacity:.06}
.stat-card.c-blue::after{background:var(--blue)}
.stat-card.c-green::after{background:var(--green)}
.stat-card.c-amber::after{background:var(--amber)}
.stat-card.c-purple::after{background:var(--accent2)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-label{font-size:12px;color:var(--text2);font-weight:500}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--text);line-height:1;margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease,color .18s ease;font-family:var(--font-body);white-space:nowrap;min-height:36px;touch-action:manipulation}
.btn{max-width:100%}
.btn span{min-width:0;overflow:hidden;text-overflow:ellipsis}
.btn-primary{background:linear-gradient(135deg,#fff,#cbd5e1);color:#050505;border:1px solid rgba(255,255,255,.42);box-shadow:0 4px 15px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px var(--accent-glow)}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:rgba(255,255,255,.11);border-color:var(--border3)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:rgba(255,255,255,.05);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-success{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.btn-success:hover{background:rgba(16,185,129,.25)}
.btn-warning{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.btn-info{background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.btn-icon{padding:7px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-lg{padding:12px 28px;font-size:15px;border-radius:14px}
.btn-group{display:flex;gap:0}
.btn-group .btn{border-radius:0}
.btn-group .btn:first-child{border-radius:8px 0 0 8px}
.btn-group .btn:last-child{border-radius:0 8px 8px 0}
.input{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:10px;font-size:13px;outline:none;transition:all .2s;background:rgba(255,255,255,.04);color:var(--text);font-family:var(--font-body)}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input::placeholder{color:var(--text3)}
.input option{background:var(--surface)}
textarea.input{resize:vertical;min-height:80px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;gap:4px}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;font-weight:700;color:var(--text3);text-align:left;padding:10px 14px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.table tr:hover td{background:rgba(255,255,255,.02)}
.table tr:last-child td{border-bottom:none}
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--accent2))}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tabs::-webkit-scrollbar{height:4px}
.tabs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.tab-item{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab-item:hover{color:var(--text)}
.tab-item.active{color:#e5e7eb;border-bottom-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s ease}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
.modal-box.wide{max-width:720px}
.modal-box.medium{max-width:520px}
.modal-box.small{max-width:400px}
.modal-box.xl{max-width:900px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.modal-body{padding:20px 24px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;color:#fff;flex-shrink:0;font-size:12px}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kanban-col{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:14px;padding:12px;min-height:180px}
.kanban-col-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s ease}
.task-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.chat-bubble{max-width:75%;border-radius:16px;padding:10px 14px;font-size:13px;line-height:1.5}
.chat-bubble.sent{background:linear-gradient(135deg,#fff,#cbd5e1);color:#050505;border-bottom-right-radius:4px;box-shadow:0 4px 14px rgba(255,255,255,.08)}
.chat-bubble.recv{background:var(--surface);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:4px}
.toast{position:fixed;bottom:24px;right:24px;z-index:200;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px)}
.toast.success{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.35);color:#34d399}
.toast.error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.35);color:#f87171}
.toast.warning{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.35);color:#fbbf24}
.toast.info{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.35);color:#93c5fd}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,255,255,.16),transparent),radial-gradient(ellipse 50% 40% at 90% 90%,rgba(255,255,255,.10),transparent),var(--bg)}
.login-card{background:rgba(20,23,40,0.9);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:44px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-dot{position:absolute;left:-24px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg2);background:var(--text3);top:4px}
.timeline-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.notif-item{display:flex;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:.15s}
.notif-item:hover{background:rgba(255,255,255,.04)}
.notif-item.unread{background:rgba(255,255,255,.06)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;box-shadow:0 0 6px var(--accent-glow)}
.search-bar{position:relative}
.search-bar input{padding-left:36px}
.search-bar .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.portal-page{min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(255,255,255,.14),transparent),var(--bg)}
.portal-header{background:rgba(8,9,14,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 12px 30px rgba(0,0,0,.12)}
.portal-content{padding:26px;max-width:1220px;width:100%;margin:0 auto}
.portal-hero{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:24px;background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.055) 55%,rgba(0,0,0,.08));box-shadow:0 22px 70px rgba(0,0,0,.18)}
.portal-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.05),transparent 45%),repeating-linear-gradient(135deg,rgba(255,255,255,.035) 0 1px,transparent 1px 12px);pointer-events:none}
.portal-hero-main{position:relative;display:grid;grid-template-columns:minmax(0,1fr) 176px;gap:24px;align-items:center}
.portal-kicker{font-size:10px;text-transform:uppercase;letter-spacing:.16em;font-weight:800;color:var(--text3);margin-bottom:8px}
.portal-title{font-family:var(--font-display);font-size:30px;line-height:1.1;font-weight:900;color:var(--text);letter-spacing:0}
.portal-subtitle{color:var(--text2);font-size:13px;margin-top:8px;max-width:680px}
.portal-action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.portal-brand-mark{width:118px;height:118px;border-radius:24px;background:#050505;border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;box-shadow:0 18px 50px rgba(0,0,0,.34);justify-self:end;overflow:hidden}
.portal-brand-mark img{width:100%;height:100%;object-fit:contain;padding:12px}
.portal-next-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.portal-action-card{cursor:pointer;display:flex;gap:12px;align-items:flex-start;border-radius:14px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018)),var(--surface);padding:15px;min-height:112px;transition:transform .18s ease,border-color .18s ease,background .18s ease}
.portal-action-card:hover{transform:translateY(-2px);border-color:var(--border3);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025)),var(--surface)}
.portal-action-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.portal-action-title{font-weight:800;font-size:13px;color:var(--text)}
.portal-action-copy{font-size:11px;color:var(--text3);line-height:1.55;margin-top:4px}
.portal-metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.portal-metric{border:1px solid var(--border);background:rgba(255,255,255,.035);border-radius:14px;padding:14px 15px;min-height:96px}
.portal-metric-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

const ago=ts=>{const d=Date.now()-new Date(ts);if(d<60000)return'just now';if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return`${Math.floor(d/86400000)}d ago`;};
const initials=n=>(n||'C').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const curr=n=>`₹${(n||0).toLocaleString('en-IN')}`;
const clamp=(n,min,max)=>Math.min(Math.max(n,min),max);
const fmtFull=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const pct=(a,b)=>b===0?0:Math.round(a/b*100);
const daysBetween=(a,b)=>Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24));
const isOverdue=d=>d&&new Date(d)<new Date();
const isUpcoming=(d,days=3)=>{if(!d)return false;const diff=(new Date(d)-new Date())/(1000*60*60*24);return diff>=0&&diff<=days;};
const groupBy=(arr,fn)=>arr.reduce((m,x)=>{const k=fn(x);(m[k]=m[k]||[]).push(x);return m;},{});
const copyText=t=>{navigator.clipboard?.writeText(t);};
const downloadJSON=(data,name)=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();};
const exportCSV=(rows,cols,name)=>{const csv=[cols.join(','),...rows.map(r=>cols.map(c=>JSON.stringify(r[c]??'')).join(','))].join('\n');const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();};
const ensureArr=v=>Array.isArray(v)?v:[];
const getInvoiceTotal=inv=>Number(inv?.totalWithGst||inv?.amount||0);
const getInvoicePaidAmount=inv=>ensureArr(inv?.payments).reduce((a,p)=>a+(parseFloat(p.amount)||0),0);
const getInvoiceBalance=inv=>Math.max(0,getInvoiceTotal(inv)-getInvoicePaidAmount(inv));

function brandName(settings){
  const saved=String(settings?.businessName||'').trim();
  return !saved||/uday/i.test(saved)?COMPANY.name:saved;
}

function installBrandIcons(){
  ['icon','shortcut icon','apple-touch-icon'].forEach(rel=>{
    const link=document.querySelector(`link[rel="${rel}"]`)||document.createElement('link');
    link.rel=rel; link.href=LOGO_B64; link.type='image/png';
    document.head.appendChild(link);
  });
}
installBrandIcons();

function buildPrintablePDFHtml(htmlContent,title){
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--indigo:#111827;--violet:#4b5563;--cyan:#d1d5db;--emerald:#10b981;--amber:#f59e0b;--rose:#f43f5e;--slate:#0f172a;--slate2:#1e293b;--slate3:#334155;--slate4:#475569;--text1:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;--border:#e2e8f0;--border2:#f1f5f9;--bg:#ffffff;--surface:#f8fafc;--surface2:#f1f5f9;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 24px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;--radius-lg:16px;--font:'Inter','Plus Jakarta Sans',Arial,Helvetica,sans-serif}

function openPrintPDF(htmlContent,title){
  const w=window.open('','_blank','width=920,height=750');
  if(!w){alert('Please allow popups to download PDF');return;}
  w.document.write(buildPrintablePDFHtml(htmlContent,title));
  w.document.close();
}

function buildPDFHeader(docTypeTag,docTitle,docNum,docDate,clientInfo){
  const numBlock=docNum?`<div class="doc-num-badge"><div class="doc-num">${docNum}</div><div class="doc-date-sm">${docDate||''}</div></div>`:`<div style="text-align:right;font-size:11px;color:rgba(255,255,255,.45)">${docDate||''}</div>`;
  return `<div class="pdf-header"><div class="header-inner"><div class="header-logo-area"><img src="${LOGO_B64}" alt="Logo" class="header-logo"/><div class="header-brand"><div class="header-company">${COMPANY.name}</div><div class="header-tagline">${COMPANY.tagline}</div></div></div><div class="header-contact">${COMPANY.phone}<br>Sales & Support: ${COMPANY.salesEmail}<br>Official: ${COMPANY.officialEmail}<br>${COMPANY.website||''}</div></div></div><div class="pdf-accent-bar"></div><div class="pdf-body"><div class="watermark">${COMPANY.name}</div><div class="doc-meta"><div><div class="doc-type-tag">${docTypeTag||'Document'}</div><div class="doc-title">${docTitle||'Document'}</div>${clientInfo?`<div class="doc-subtitle">Prepared for: <strong>${clientInfo}</strong></div>`:''}</div>${numBlock}</div><div class="divider"></div>`;
}

function buildPDFFooter(note){
  const d=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  return `</div><div class="pdf-footer"><div><strong>${COMPANY.name}</strong> &nbsp;|&nbsp; ${COMPANY.phone} &nbsp;|&nbsp; ${COMPANY.salesEmail} &nbsp;|&nbsp; ${COMPANY.website} &nbsp;|&nbsp; UPI: ${COMPANY.upi}</div><div>${note||'Generated '+d}</div></div>`;
}

function pdfPaymentBox(amount,reference){
  const amountHtml=amount!==undefined&&amount!==null?`<div class="pay-card"><div class="pay-k">Amount Payable</div><div class="pay-amount">₹${pdfCurr(amount)}</div></div>`:'';

function pdfPaymentTimeline(inv,payments,balance){
  const created=pdfFmt(inv.createdAt);
  const due=pdfFmt(inv.dueDate);
  const last=payments.length?pdfFmt(payments[payments.length-1].date||payments[payments.length-1].createdAt):'Awaiting payment';
  const settled=balance<=0;
  return `<div class="pay-timeline"><div class="pay-step done"><div class="pay-step-title">Issued</div><div class="pay-step-copy">${created}<br>Invoice shared with client.</div></div><div class="pay-step ${payments.length?'done':'active'}"><div class="pay-step-title">Payment</div><div class="pay-step-copy">${last}<br>${payments.length?'Payment recorded.':'Awaiting transfer.'}</div></div><div class="pay-step ${settled?'done':'active'}"><div class="pay-step-title">Due Date</div><div class="pay-step-copy">${due}<br>${settled?'No balance pending.':'Balance due: \u20B9'+pdfCurr(balance)}</div></div><div class="pay-step ${settled?'done':''}"><div class="pay-step-title">Settlement</div><div class="pay-step-copy">${settled?'Marked as settled.':'Receipt will be issued after payment confirmation.'}</div></div></div>`;
}

  const terms=[

function buildInvoiceEmail(inv,client,settings){
  const total=getInvoiceTotal(inv);
  const balance=getInvoiceBalance(inv);
  const portalLink=`${window.location.origin}${window.location.pathname}?client=${client.id}&tab=invoices`;
  const senderName=brandName(settings);
  const subject=`Invoice ${inv.number||''} from ${senderName}`;
  const body=[
    `Dear ${client.name||'Client'},`,
    '',
    `Please find invoice ${inv.number||''} for ${curr(total)} from ${senderName}.`,
    `Balance due: ${curr(balance)}.`,
    `Due date: ${fmt(inv.dueDate)}.`,
    '',
    'Payment details:',
    `UPI ID: ${COMPANY.upi}`,
    `Payee: ${COMPANY.paymentName}`,
    `Reference: ${inv.number||'Invoice number'}`,
    `Sales & support: ${COMPANY.salesEmail}`,
    `Official inquiries: ${COMPANY.officialEmail}`,
    `Website: ${COMPANY.website}`,
    '',
    `Client portal: ${portalLink}`,
    '',
    'The original invoice PDF is attached with the full invoice layout, QR code, payment details, tax summary, terms, and signature area.',
    '',
    'Regards,',
    senderName
  ].join('\n');
  return {subject,body};
}
function invoiceEmailPayload(inv,client,settings){
  const {subject,body}=buildInvoiceEmail(inv,client,settings);
  const total=getInvoiceTotal(inv);
  const balance=getInvoiceBalance(inv);
  const recipientEmail=String(client.email||'').trim();
  const pdfTitle=inv.number||'Invoice';
  return {
    to:recipientEmail,
    subject,
    body,
    fromName:brandName(settings),
    pdfHtml:buildPrintablePDFHtml(buildInvoicePDFContent(inv,client,settings),pdfTitle),
    invoice:{
      number:inv.number||'',
      description:inv.description||'Service',
      total,
      paid:getInvoicePaidAmount(inv),
      balance,
      issueDate:inv.createdAt||'',
      dueDate:inv.dueDate||'',
      status:inv.status||'draft'
    },
    client:{name:client.name||'Client',company:client.company||'',email:recipientEmail},
    payment:{upi:COMPANY.upi,payee:COMPANY.paymentName,reference:inv.number||'Invoice number'},
    portalLink:`${window.location.origin}${window.location.pathname}?client=${client.id}&tab=invoices`
  };
}

  const {subject,body}=buildInvoiceEmail(inv,client,settings);
  const to=client.email||'';
  setTimeout(()=>{window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;},450);
}
async function sendInvoiceEmail(inv,client,settings){
  const endpoint=(settings?.smtpApiEndpoint||'/api/send-invoice-email').trim();
  let recipientEmail=String(client.email||'').trim();
  if(!recipientEmail){
    recipientEmail=prompt('Enter client email address to send this invoice:','')?.trim()||'';
  }
  if(!recipientEmail||!recipientEmail.includes('@')){alert('Client email is missing or invalid. Add a valid client email before sending.');return;}
  if(window.location.protocol==='file:'){
    alert('Automatic SMTP needs the local server. Run npm start and open http://localhost:3000 instead of opening index.html directly.');
    return;
  }
  if(endpoint){
    try{
      const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(invoiceEmailPayload(inv,{...client,email:recipientEmail},settings))});
      const data=await res.json().catch(()=>({}));
      if(!res.ok||data.ok===false)throw new Error(data.error||'SMTP send failed');
      alert(`Invoice email sent to ${recipientEmail}`);
      return;
    }catch(err){
      console.warn('SMTP endpoint failed, falling back to mail client:',err);
      alert(`SMTP send failed: ${err.message}`);
      return;
    }
  }
  alert('SMTP API endpoint is missing in Admin Settings.');
}

const sBadge=s=>{const m={paid:'badge-paid',overdue:'badge-overdue',draft:'badge-draft',sent:'badge-sent',pending:'badge-pending',active:'badge-active',approved:'badge-approved',completed:'badge-completed',cancelled:'badge-cancelled'};return`<span class="status-badge ${m[(s||'').toLowerCase()]||'badge-draft'}">${s||'—'}</span>`;};

function normalizeClientData(client){
  if(!client)return client;
  let completedAt=client.completedAt||null;
  if(!completedAt&&((client.progress||0)>=100||client.status==='Completed'))completedAt=new Date().toISOString();

  const invoices=ensureArr(client.invoices).map(inv=>{
    const payments=ensureArr(inv.payments);
    const paid=getInvoicePaidAmount({...inv,payments});
    const total=getInvoiceTotal(inv);
    let status=inv.status||'draft';
    if(paid>0&&paid<total)status='partial';
    if(total>0&&paid>=total)status='paid';
    if(status!=='paid'&&inv.dueDate&&new Date(inv.dueDate)<new Date()&&status!=='draft')status='overdue';
    return {...inv,payments,reminders:ensureArr(inv.reminders),receiptUrl:inv.receiptUrl||'',status};
  });

  const approvals=ensureArr(client.approvals).map(a=>({...a,comments:ensureArr(a.comments)}));
  const messages=ensureArr(client.messages).map(m=>({...m,attachments:ensureArr(m.attachments)}));
  const contracts=ensureArr(client.contracts).map(c=>({...c,signatureName:c.signatureName||'',signatureEmail:c.signatureEmail||'',signedAt:c.signedAt||null,status:c.status||'draft'}));
  const proposals=ensureArr(client.proposals).map(p=>({...p,items:ensureArr(p.items),status:p.status||'draft'}));
  const announcements=ensureArr(client.announcements).map(a=>({...a,type:a.type||'update'}));
  const requests=ensureArr(client.requests).map(r=>({...r,status:r.status||'new',type:r.type||'revision'}));
  let followUps=ensureArr(client.followUps);
  if(completedAt){
    const defaults=[
      {key:'testimonial',title:'Request testimonial',description:'Ask the client for a testimonial after project completion.'},
      {key:'feedback',title:'Send post-project feedback form',description:'Collect final feedback and satisfaction score.'},
      {key:'upsell',title:'Plan upsell / maintenance offer',description:'Share next-step support, retainers, or growth offers.'},
    ];
    defaults.forEach(item=>{
      if(!followUps.find(f=>f.key===item.key))followUps.push({...item,id:uid(),status:'pending',createdAt:new Date().toISOString()});
    });
  }

  const reminders=[];
  invoices.forEach(inv=>{
    if(inv.status==='overdue')reminders.push({id:`inv-overdue-${inv.id}`,type:'invoice',priority:'high',text:`Invoice ${inv.number||''} is overdue`,dueDate:inv.dueDate||null});
    else if(inv.status!=='paid'&&inv.status!=='draft'&&isUpcoming(inv.dueDate,5))reminders.push({id:`inv-upcoming-${inv.id}`,type:'invoice',priority:'medium',text:`Invoice ${inv.number||''} is due soon`,dueDate:inv.dueDate});
  });
  approvals.filter(a=>a.status==='pending').forEach(a=>reminders.push({id:`approval-${a.id}`,type:'approval',priority:'medium',text:`Approval pending: ${a.title}`,dueDate:a.createdAt}));
  ensureArr(client.tasks).filter(t=>t.status!=='completed'&&isUpcoming(t.dueDate,3)).forEach(t=>reminders.push({id:`task-${t.id}`,type:'task',priority:t.priority||'medium',text:`Task deadline approaching: ${t.title}`,dueDate:t.dueDate}));
  if(isUpcoming(client.dueDate,5))reminders.push({id:'project-due',type:'project',priority:'high',text:'Project due date is approaching',dueDate:client.dueDate});

  return {
    ...client,
    completedAt,
    activity:ensureArr(client.activity),
    notifications:ensureArr(client.notifications),
    messages,
    tasks:ensureArr(client.tasks),
    milestones:ensureArr(client.milestones),
    files:ensureArr(client.files),
    invoices,
    approvals,
    tickets:ensureArr(client.tickets),
    timeEntries:ensureArr(client.timeEntries),
    notes:ensureArr(client.notes),
    contracts,
    feedback:ensureArr(client.feedback),
    expenses:ensureArr(client.expenses),
    meetings:ensureArr(client.meetings),
    links:ensureArr(client.links),
    announcements,
    proposals,
    requests,
    followUps,
    reminders,
    websiteChangeRequestEnabled: client.websiteChangeRequestEnabled||false,
    pinned: client.pinned||false,
    internalNotes: ensureArr(client.internalNotes),
    onboardingProgress: ensureArr(client.onboardingProgress),
  };
}

    .then(q=>{const r=[];q.forEach(d=>r.push(normalizeClientData({id:d.id,...d.data()})));_lsSave(LS_CLIENTS,r);return r;})

const diffSummaryText=(before,after)=>{
  const parts=[];
  if(before.status!==after.status)parts.push(`status ${before.status} -> ${after.status}`);
  if(before.progress!==after.progress)parts.push(`progress ${before.progress}% -> ${after.progress}%`);
  if(before.taskCount!==after.taskCount)parts.push(`tasks ${before.taskCount} -> ${after.taskCount}`);
  if(before.fileCount!==after.fileCount)parts.push(`files ${before.fileCount} -> ${after.fileCount}`);
  if(before.messageCount!==after.messageCount)parts.push(`messages ${before.messageCount} -> ${after.messageCount}`);
  if(before.requestCount!==after.requestCount)parts.push(`requests ${before.requestCount} -> ${after.requestCount}`);
  if(before.meetingCount!==after.meetingCount)parts.push(`meetings ${before.meetingCount} -> ${after.meetingCount}`);
  return parts.length?parts.join(' | '):'General project update';
};

/* ═══ COMPONENTS ═══ */
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  return <div className={`toast ${type}`}><span>{type==='success'?'✓':'✕'}</span>{msg}</div>;
}
function useToast(){
  const [t,setT]=useState(null);
  const show=(msg,type='success')=>setT({msg,type,id:uid()});
  const ToastEl=t?<Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>setT(null)}/>:null;
  return{show,ToastEl};
}

function Modal({title,onClose,children,size='medium'}){
  return <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className={`modal-box ${size}`}>
      <div className="modal-header">
        <h3 className="modal-title">{title}</h3>
        <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose}><Icon n="x"/></button>
      </div>
      <div className="modal-body">{children}</div>
    </div>
  </div>;
}

function Avatar({name,size=36,color='#111111'}){
  return <div className="avatar" style={{width:size,height:size,background:color,fontSize:size*0.36}}>{initials(name)}</div>;
}

function Badge({children,bg,text}){
  return <span className="badge" style={{background:bg,color:text}}>{children}</span>;
}

function ProgressRing({pct,size=80,stroke=6,color='#111111'}){
  const r=size/2-stroke;
  const circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  return <div className="ring-container" style={{width:size,height:size}}>
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} stroke="rgba(255,255,255,.08)" strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s ease'}}/>
    </svg>
    <div className="ring-text">{pct}%</div>
  </div>;
}

function Loader(){

function useTheme() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('ut_theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('ut_theme', theme); } catch {}
  }, [theme]);
  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return { theme, toggle };
}

function useSessionTimer() {
  const [startTime] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const interval = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
    return () => clearInterval(interval);
  }, [startTime]);
  const h = Math.floor(elapsed / 3600), m = Math.floor((elapsed % 3600) / 60), s = elapsed % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + s + 's';
  return s + 's';
}

function calcHealthScore(client) {
  let score = 100;
  const overdueInv = (client.invoices||[]).filter(i => i.status !== 'paid' && isOverdue(i.dueDate));
  score -= overdueInv.length * 10;
  const openTickets = (client.tickets||[]).filter(t => t.status !== 'resolved' && t.status !== 'closed');
  score -= openTickets.length * 5;
  const recentMsgs = (client.messages||[]).filter(m => (Date.now() - new Date(m.ts||m.createdAt||0)) < 7*24*60*60*1000);
  if (recentMsgs.length === 0) score -= 10;
  if ((client.progress||0) < 10 && client.status === 'In Progress') score -= 15;
  return Math.max(0, Math.min(100, score));
}

function HealthScoreBadge({client}) {
  const score = calcHealthScore(client);
  const color = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--amber)' : 'var(--red)';
  const label = score >= 80 ? 'Healthy' : score >= 60 ? 'Fair' : 'At Risk';
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:99,background:`${color}20`,color,fontSize:11,fontWeight:700,border:`1px solid ${color}30`}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:color,display:'inline-block'}}/>
      {label} {score}
    </span>
  );
}

  return (
    <div style={{position:'relative', width:size, height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={radius} fill="none"
          stroke={`url(#${gradId})`} strokeWidth={stroke}
          strokeDasharray={circumference} strokeDashoffset={offset}

function RevenueChart({clients}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    if (chartRef.current) chartRef.current.destroy();
    const months = [], revenue = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      months.push(d.toLocaleDateString('en-IN', {month:'short', year:'2-digit'}));
      let total = 0;
      clients.forEach(c => (c.invoices||[]).filter(inv => {
        const invDate = new Date(inv.createdAt||inv.date||'');
        return invDate.getMonth()===d.getMonth()&&invDate.getFullYear()===d.getFullYear()&&inv.status==='paid';
      }).forEach(inv => total += getInvoicePaidAmount(inv)));
      revenue.push(total);
    }
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels: months, datasets: [{ label: 'Revenue', data: revenue, backgroundColor: 'rgba(255,255,255,0.7)', borderColor: '#f8fafc', borderWidth: 2, borderRadius: 8 }] },

function AdminClients({clients,settings,onSelect,onEdit,onDelete,onTogglePin}){
  const [q,setQ]=useState('');
  const [sf,setSf]=useState('All');
  const [selected,setSelected]=useState([]);
  const [pg,setPg]=useState(1);const perPage=20;

  const sorted=useMemo(()=>[...clients.filter(c=>c.pinned),...clients.filter(c=>!c.pinned)],[clients]);
  const filtered=useMemo(()=>sorted.filter(c=>{
    const m=!q||[c.name,c.company,c.projectName,c.email].some(x=>(x||'').toLowerCase().includes(q.toLowerCase()));
    return m&&(sf==='All'||c.status===sf);
  }),[sorted,q,sf]);

  const toggleSelect=id=>setSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const clearSel=()=>setSelected([]);
  const bulkExport=()=>{downloadJSON({clients:clients.filter(c=>selected.includes(c.id)),exportedAt:new Date().toISOString()},'selected-clients.json');};
  const bulkDelete=()=>{if(!confirm('Delete '+selected.length+' clients?'))return;selected.forEach(id=>onDelete(id));setSelected([]);};

  return (
    <div className="space-4 fade-in">
      <div style={{marginBottom:8}}>
        <h1 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:26,background:'linear-gradient(135deg,#f1f5f9,#e5e7eb)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Clients</h1>
        <p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>{clients.length} total clients</p>
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
        <div className="search-bar" style={{flex:1,minWidth:200}}>
          <span className="search-icon"><Icon n="search" s={14}/></span>
          <input className="input" placeholder="Search clients…" value={q} onChange={e=>{setQ(e.target.value);setPg(1);}}/>
        </div>
        <select className="input" style={{width:'auto'}} value={sf} onChange={e=>{setSf(e.target.value);setPg(1);}}>
          <option>All</option>{Object.keys(STATUS).map(s=><option key={s}>{s}</option>)}
        </select>
        {filtered.length>0&&<label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text2)',cursor:'pointer',whiteSpace:'nowrap'}}>
          <input type="checkbox" checked={selected.length===filtered.length&&filtered.length>0} onChange={e=>e.target.checked?setSelected(filtered.map(c=>c.id)):clearSel()}/>Select all
        </label>}
      </div>
      {selected.length>0&&<div style={{background:'linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.08))',border:'1px solid rgba(255,255,255,.20)',borderRadius:10,padding:'10px 16px',display:'flex',alignItems:'center',gap:12,animation:'slideDown .15s ease',backdropFilter:'blur(8px)'}}>
        <span style={{fontSize:13,fontWeight:700,color:'#e5e7eb'}}>{selected.length} selected</span>
        <button className="btn btn-secondary btn-sm" onClick={bulkExport}><Icon n="download" s={12}/> Export</button>
        <button className="btn btn-danger btn-sm" onClick={bulkDelete}><Icon n="trash" s={12}/> Delete</button>
        <button className="btn btn-ghost btn-sm" onClick={clearSel}>✕ Clear</button>
      </div>}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length===0?<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">No clients match your filter.</div></div>:
          <div>
            <div style={{display:'grid',gridTemplateColumns:'32px 1fr auto auto auto auto',gap:10,padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'rgba(255,255,255,.015)'}}>
              <span/>{['Client','Health','Status','Revenue','Actions'].map(h=><span key={h} style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.04em'}}>{h}</span>)}
            </div>
            {filtered.slice((pg-1)*perPage,pg*perPage).map(c=>(
              <div key={c.id} style={{display:'grid',gridTemplateColumns:'32px 1fr auto auto auto auto',gap:10,padding:'10px 16px',alignItems:'center',borderBottom:'1px solid var(--border)',transition:'background .15s',borderLeft:c.pinned?'2px solid var(--accent)':'2px solid transparent'}}
                onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.025)'}
                onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                <input type="checkbox" checked={selected.includes(c.id)} onChange={()=>toggleSelect(c.id)} onClick={e=>e.stopPropagation()}/>
                <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>onSelect(c.id)}>
                  <Avatar name={c.name} size={36} color={settings.brandColor||'#f8fafc'}/>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,display:'flex',alignItems:'center',gap:6}}>
                      {c.pinned&&<span style={{fontSize:12}}>📌</span>}{c.name}
                    </div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{c.company||c.projectName||'No project'}</div>
                  </div>
                </div>
                <div style={{cursor:'pointer'}} onClick={()=>onSelect(c.id)}><HealthScoreBadge client={c}/></div>
                <div style={{cursor:'pointer'}} onClick={()=>onSelect(c.id)}><Badge bg={sc(c.status).bg} text={sc(c.status).text}>{c.status||'Pending'}</Badge></div>
                <div style={{fontSize:13,fontWeight:700,cursor:'pointer'}} onClick={()=>onSelect(c.id)}>{curr((c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0))}</div>
                <div style={{display:'flex',gap:3}} onClick={e=>e.stopPropagation()}>
                  <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>onTogglePin&&onTogglePin(c.id)} title={c.pinned?'Unpin':'Pin'} style={{fontSize:13}}>{c.pinned?'📌':'📎'}</button>
                  <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>onEdit(c)}><Icon n="edit" s={13}/></button>
                  <button className="btn btn-danger btn-icon btn-sm" onClick={()=>{if(confirm('Delete client?'))onDelete(c.id);}}><Icon n="trash" s={13}/></button>
                </div>
              </div>
            ))}
          </div>
        }
      </div>
      <Pagination total={filtered.length} page={pg} perPage={perPage} onChange={setPg}/>
    </div>
  );
}

function NavSearchBar({clients,onSelect,onSearchPage,sideCollapsed}){
  const [q,setQ]=useState('');
  const [open,setOpen]=useState(false);
  const inp=React.useRef(null);
  const lq=q.toLowerCase().trim();
  const results=React.useMemo(()=>{
    if(!lq)return[];
    const r=[];
    clients.forEach(cl=>{
      if((cl.name||'').toLowerCase().includes(lq)||(cl.email||'').toLowerCase().includes(lq)||(cl.company||'').toLowerCase().includes(lq))
        r.push({icon:'👤',label:cl.name||cl.company||'Client',sub:cl.email||cl.status||'',id:cl.id,tab:null});
      (cl.invoices||[]).forEach(inv=>{
        if((inv.number||'').toLowerCase().includes(lq)||(inv.description||'').toLowerCase().includes(lq))
          r.push({icon:'🧾',label:`${inv.number||'INV'} · ${inv.description||''}`,sub:'Invoice · '+(cl.name||''),id:cl.id,tab:'invoices'});
      });
      (cl.tasks||[]).forEach(t=>{
        if((t.title||'').toLowerCase().includes(lq))
          r.push({icon:'✅',label:t.title,sub:'Task · '+(cl.name||''),id:cl.id,tab:'tasks'});
      });
    });
    return r.slice(0,7);
  },[lq,clients]);
  const go=item=>{onSelect(item.id,item.tab);setQ('');setOpen(false);};
  if(sideCollapsed)return(
    <div style={{padding:'8px 6px',borderBottom:'1px solid var(--border)'}}>
      <div className="nav-item" style={{justifyContent:'center'}} onClick={onSearchPage} title="Search (⌘K)">
        <span style={{fontSize:16}}>🔍</span>
      </div>
    </div>
  );
  return(
    <div className="sb-search">
      <div className="sb-search-wrap">
        <span style={{fontSize:14,color:'var(--text3)',lineHeight:1,flexShrink:0}}>🔍</span>
        <input
          ref={inp}
          className="sb-search-inp"
          placeholder="Search clients, invoices..."
          value={q}
          onChange={e=>{setQ(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          onBlur={()=>setTimeout(()=>setOpen(false),160)}
          onKeyDown={e=>{
            if(e.key==='Escape'){setQ('');setOpen(false);inp.current?.blur();}
            if(e.key==='Enter'&&results.length>0)go(results[0]);
          }}
        />
        {q
          ?<button className="sb-search-clr" onMouseDown={e=>{e.preventDefault();setQ('');inp.current?.focus();}}>✕</button>
          :<span className="sb-search-hint">⌘K</span>
        }
      </div>
      {open&&lq&&(
        <div className="sb-search-drop">
          {results.length===0
            ?<div className="sb-search-empty">No results for "{q}"</div>
            :results.map((r,i)=>(
              <div key={i} className="sb-search-row" onMouseDown={()=>go(r)}>
                <span className="sb-search-ico">{r.icon}</span>
                <div style={{minWidth:0}}>
                  <div className="sb-search-name">{r.label}</div>
                  <div className="sb-search-sub">{r.sub}</div>
                </div>
              </div>
            ))
          }
          <div className="sb-search-row" onMouseDown={onSearchPage} style={{opacity:.65}}>
            <span className="sb-search-ico">🔎</span>
            <div className="sb-search-name" style={{fontSize:11.5}}>See all results →</div>
          </div>
        </div>
      )}
    </div>
  );
}

function GroupedNav({navGroups,page,selId,clients,pendingManagerApprovals,onNav,sideCollapsed}){
  const [open,setOpen]=useState(()=>{
    const s={};navGroups.forEach(g=>{s[g.group]=true;});return s;
  });
  const toggle=g=>setOpen(p=>({...p,[g]:!p[g]}));
  React.useEffect(()=>{
    const ag=navGroups.find(g=>g.items.some(i=>i.id===page));
    if(ag)setOpen(p=>({...p,[ag.group]:true}));
  },[page]);
  if(sideCollapsed){
    return <div>{navGroups.flatMap(g=>g.items).map(n=>(
      <div key={n.id} className={`nav-item ${page===n.id&&!selId?'active':''}`} onClick={()=>onNav(n.id)} title={n.label} style={{justifyContent:'center',position:'relative'}}>
        <Icon n={n.icon} s={16}/>
        {n.id==='approvals'&&pendingManagerApprovals>0&&<span className='nav-badge' style={{position:'absolute',top:3,right:3,minWidth:13,height:13,fontSize:9,padding:'0 3px'}}>{pendingManagerApprovals}</span>}
      </div>
    ))}</div>;
  }
  return <div>{navGroups.map(g=>{
    const isOpen=open[g.group]!==false;
    return <div key={g.group}>
      <div className='nav-group-hdr' onClick={()=>toggle(g.group)}>
        <span className='nav-group-lbl'><span>{g.emoji}</span>{g.group}</span>
        <span className={`nav-group-chev${isOpen?' open':''}`}>›</span>
      </div>
      {isOpen&&<div>{g.items.map(n=>(
        <div key={n.id} className={`nav-item ${page===n.id&&!selId?'active':''}`} onClick={()=>onNav(n.id)}>
          <Icon n={n.icon} s={15}/><span style={{fontSize:13}}>{n.label}</span>
          {n.id==='clients'&&clients.length>0&&<span className='nav-badge' style={{marginLeft:'auto'}}>{clients.length}</span>}
          {n.id==='approvals'&&pendingManagerApprovals>0&&<span className='nav-badge' style={{marginLeft:'auto'}}>{pendingManagerApprovals}</span>}
        </div>
      ))}</div>}
    </div>;
  })}</div>;
}

function AdminApp({onSwitchPanel}){
  const [settings,setSettings]=useState(DEF_SETTINGS);
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [authed,setAuthed]=useState(()=>{try{return localStorage.getItem('ut_authed')==='true';}catch{return false;}});
  const [page,setPage]=useState('overview');
  const [selId,setSelId]=useState(null);
  const [editClient,setEditClient]=useState(null);
  const [showNotifs,setShowNotifs]=useState(false);
  const [cmdOpen,setCmdOpen]=useState(false);
  const [showGlobalSearch,setShowGlobalSearch]=useState(false);
  const [sideCollapsed,setSideCollapsed]=useState(false);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const {show,ToastEl}=useToast();
  const {theme,toggle:toggleTheme}=useTheme();
  const sessionTime=useSessionTimer();

  useEffect(()=>{
    Promise.all([getSettings(),getClients()]).then(([s,c])=>{
      setSettings(s);setClients(c.map(normalizeClientData));setLoading(false);
    });
  },[]);

  useEffect(()=>{
    if(!authed||!db())return;
    const unsub=db().collection(FS_COL).onSnapshot(q=>{
      const c=[];q.forEach(d=>c.push(normalizeClientData({id:d.id,...d.data()})));setClients(c);
    },()=>{});
    return ()=>unsub();
  },[authed]);

  useEffect(()=>{
    if(!authed)return;
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setCmdOpen(true);}
      if(e.key==='Escape'){setCmdOpen(false);setShowShortcuts(false);}
      if(e.key==='?'&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA')setShowShortcuts(true);
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[authed]);

  const updSettings=s=>{
    setSettings(prev=>{
      const newVal=typeof s==='function'?s(prev):s;
      saveSettings(newVal);
      return newVal;
    });
    show('Settings saved!');
  };
  const applyManagerDecision=(req,decision)=>{
    let nextSettings={...settings,managerApprovals:(settings.managerApprovals||[]).map(x=>x.id===req.id?{...x,status:decision,reviewedAt:new Date().toISOString(),reviewedBy:'admin'}:x)};
    if(decision==='approved'&&req.payloadClient){const normalized=normalizeClientData(req.payloadClient);setClients(p=>p.map(c=>c.id===normalized.id?normalized:c));saveClient(normalized);}
    if(decision==='approved'&&req.payloadSettingsPatch)nextSettings={...nextSettings,...req.payloadSettingsPatch};
    nextSettings={...pushManagerAudit(nextSettings,{type:'review',actor:'admin',action:`Manager request ${decision}`,requestId:req.id,clientName:req.clientName||'General'}),
      managerNotifications:[{id:uid(),text:`Admin ${decision} your request${req.clientName?` for ${req.clientName}`:''}`,read:false,ts:new Date().toISOString(),requestId:req.id,status:decision},...(nextSettings.managerNotifications||[])].slice(0,100)};
    setSettings(nextSettings);saveSettings(nextSettings);show(`Manager request ${decision}`);
  };

  const updClient=(id,fn)=>{
    setClients(prev=>{
      const nc=prev.map(c=>c.id===id?normalizeClientData(fn(c)):c);
      const updated=nc.find(c=>c.id===id);
      if(updated)saveClient(updated);
      return nc;
    });
  };

  const delClient=id=>{
    setClients(p=>p.filter(c=>c.id!==id));deleteClient(id);
    if(selId===id){setSelId(null);setPage('clients');}
    show('Client deleted');
  };

  const addOrUpdateClient=c=>{
    const isNew=!clients.find(x=>x.id===c.id);
    if(isNew){
      const nc=normalizeClientData({...c,id:c.id||tok(),createdAt:new Date().toISOString(),pinned:false,activity:[],notifications:[],messages:[],tasks:[],milestones:[],files:[],invoices:[],approvals:[],tickets:[],timeEntries:[],notes:[],contracts:[],feedback:[],expenses:[],meetings:[],links:[],announcements:[],proposals:[],requests:[],followUps:[],reminders:[]});
      setClients(p=>[...p,nc]);saveClient(nc);
    } else {
      const normalized=normalizeClientData(c);
      setClients(p=>p.map(x=>x.id===c.id?normalized:x));saveClient(normalized);
    }
    setPage('clients');show(isNew?'Client added!':'Client updated!');
  };

  const handleCmd=cmd=>{
    if(cmd.action==='addClient'){setEditClient({});setPage('form');}
    if(cmd.action==='overview'){setPage('overview');setSelId(null);}
    if(cmd.action==='analytics'){setPage('analytics');setSelId(null);}
    if(cmd.action==='settings'){setPage('settings');setSelId(null);}
    if(cmd.action==='calendar'){setPage('calendar');setSelId(null);}
    if(cmd.action==='reports'){setPage('reports');setSelId(null);}
    if(cmd.action==='openClient'){setSelId(cmd.data);setPage('client');}
    if(cmd.action==='exportAll'){downloadJSON({settings,clients,exportedAt:new Date().toISOString()},'clientos-backup.json');show('Data exported!');}
  };

  const togglePin=id=>{
    updClient(id,c=>({...c,pinned:!c.pinned}));
    const c=clients.find(x=>x.id===id);
    show(c?.pinned?'Unpinned client':'Pinned client');
  };

  if(loading)return<Loader/>;
  if(!authed)return<AdminLogin settings={settings} onLogin={()=>{setAuthed(true);try{localStorage.setItem('ut_authed','true');}catch{}}} onSwitchPanel={onSwitchPanel}/>;

  const selClient=clients.find(c=>c.id===selId);
  const allNotifs=clients.flatMap(c=>(c.notifications||[]).map(n=>({...n,clientName:c.name,clientId:c.id}))).sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,30);
  const unreadCount=allNotifs.filter(n=>!n.read).length;
  const pendingManagerApprovals=(settings.managerApprovals||[]).filter(x=>(x.status||'pending')==='pending').length;

  const stats={
    total:clients.length,active:clients.filter(c=>c.status==='In Progress').length,
    revenue:clients.reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0)+s,0),
    pending:clients.reduce((s,c)=>(c.tickets||[]).filter(t=>t.status==='open').length+s,0),
    due:clients.reduce((s,c)=>(c.invoices||[]).filter(i=>i.status==='sent'||i.status==='overdue').reduce((a,i)=>a+getInvoiceBalance(i),0)+s,0),
    completed:clients.filter(c=>c.status==='Completed').length,
    totalTasks:clients.reduce((s,c)=>(c.tasks||[]).length+s,0),
    completedTasks:clients.reduce((s,c)=>(c.tasks||[]).filter(t=>t.status==='completed').length+s,0),
    totalHours:clients.reduce((s,c)=>(c.timeEntries||[]).reduce((a,e)=>a+Number(e.hours||0),0)+s,0),
    avgProgress:clients.length?Math.round(clients.reduce((s,c)=>s+(c.progress||0),0)/clients.length):0,
  };

  const navGroups=[
    {group:'Core',emoji:'⚡',items:[
      {id:'overview',label:'Dashboard',icon:'dashboard'},
      {id:'clients',label:'Clients',icon:'users'},
      {id:'search',label:'Search',icon:'search'},
      {id:'calendar',label:'Calendar',icon:'calendar'},
    ]},
    {group:'Finance',emoji:'💰',items:[
      {id:'accounting',label:'Accounting',icon:'dollar'},
      {id:'quotations',label:'Quotations',icon:'note'},
      {id:'reports',label:'Reports',icon:'pieChart'},
      {id:'catalog',label:'Services',icon:'box'},
    ]},
    {group:'Projects',emoji:'📋',items:[
      {id:'kanban',label:'Kanban',icon:'board'},
      {id:'timer',label:'Time Tracker',icon:'clock'},
      {id:'goals',label:'Goals',icon:'star'},
      {id:'onboarding',label:'Onboarding',icon:'star'},
    ]},
    {group:'Team',emoji:'👥',items:[
      {id:'team',label:'Team Board',icon:'users'},
      {id:'bulk',label:'Bulk Message',icon:'send'},
      {id:'leaderboard',label:'Leaderboard',icon:'trending'},
      {id:'approvals',label:'Approvals',icon:'check'},
    ]},
    {group:'System',emoji:'⚙️',items:[
      {id:'analytics',label:'Analytics',icon:'analytics'},
      {id:'budget',label:'Budget',icon:'dollar'},
      {id:'settings',label:'Settings',icon:'settings'},
    ]},
  ];
  const navMain=navGroups.flatMap(g=>g.items);

  const clearNotifs=()=>{
    clients.forEach(c=>{if((c.notifications||[]).some(n=>!n.read))updClient(c.id,x=>({...x,notifications:(x.notifications||[]).map(n=>({...n,read:true}))}));});
    setShowNotifs(false);
  };

  const pinnedClients=clients.filter(c=>c.pinned);
  const unpinnedClients=clients.filter(c=>!c.pinned);

  return (
    <div className="app-layout">
      <div className="aurora-bg"><div className="aurora-blob"/><div className="aurora-blob"/><div className="aurora-blob"/></div>
      {mobileMenuOpen&&<div className="sidebar-overlay" onClick={()=>setMobileMenuOpen(false)}/>}

      <aside className={`sidebar ${sideCollapsed?'collapsed':''} ${mobileMenuOpen?'mobile-open':''}`}>
        <div className="sidebar-brand">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="brand-logo" onClick={()=>setSideCollapsed(!sideCollapsed)} style={{cursor:'pointer',overflow:'hidden'}}>
              <img src={LOGO_B64} alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
            </div>
            <div>
              <div className="brand-name">{settings.businessName}</div>
              <div className="brand-sub">Admin Panel</div>
            </div>
          </div>
        </div>
        <NavSearchBar
          clients={clients}
          sideCollapsed={sideCollapsed}
          onSelect={(id,tab)=>{setSelId(id);setPage('client');setEditClient(null);setMobileMenuOpen(false);}}
          onSearchPage={()=>{setPage('search');setSelId(null);setMobileMenuOpen(false);}}
        />
        <nav style={{flex:1,padding:'8px 6px',overflowY:'auto'}}>
          <GroupedNav navGroups={navGroups} page={page} selId={selId} clients={clients} pendingManagerApprovals={pendingManagerApprovals} onNav={(id)=>{setPage(id);setSelId(null);setEditClient(null);setMobileMenuOpen(false);}} sideCollapsed={sideCollapsed}/>
          {pinnedClients.length>0&&<div className="nav-section">
            <div className="nav-label">📌 Pinned</div>
            {pinnedClients.map(c=>(
              <div key={c.id} className={`nav-item ${selId===c.id?'active':''}`}
                onClick={()=>{setSelId(c.id);setPage('client');setEditClient(null);setMobileMenuOpen(false);}}>
                <Avatar name={c.name} size={22} color={settings.brandColor||'#f8fafc'}/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
              </div>
            ))}
          </div>}
          {unpinnedClients.length>0&&<div className="nav-section">
            <div className="nav-label">Clients</div>
            {unpinnedClients.slice(0,8).map(c=>(
              <div key={c.id} className={`nav-item ${selId===c.id?'active':''}`}
                onClick={()=>{setSelId(c.id);setPage('client');setEditClient(null);setMobileMenuOpen(false);}}>
                <Avatar name={c.name} size={22} color={settings.brandColor||'#f8fafc'}/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
                {(c.tickets||[]).filter(t=>t.status==='open').length>0&&<span className="nav-badge">{(c.tickets||[]).filter(t=>t.status==='open').length}</span>}
              </div>
            ))}
          </div>}
        </nav>
        <div style={{padding:'8px',borderTop:'1px solid var(--border)'}}>
          <div className="nav-item" style={{opacity:.6,fontSize:12}} onClick={()=>setShowShortcuts(true)}>
            <span style={{fontSize:14}}>⌨️</span><span className="sftext">Shortcuts (?)</span>
          </div>
          <div className="nav-item" onClick={()=>{setAuthed(false);try{localStorage.removeItem('ut_authed');}catch{}}}>
            <Icon n="logout" s={16}/><span>Sign Out</span>
          </div>
        </div>
      </aside>

      <div className="main-area">
        <header className="topbar">
          <button className="btn btn-ghost btn-icon" onClick={()=>{if(window.innerWidth<=768)setMobileMenuOpen(!mobileMenuOpen);else setSideCollapsed(!sideCollapsed);}}><Icon n="menu" s={16}/></button>
          <div className="topbar-title">
            {page==='client'&&selClient?selClient.name:page==='overview'?'Dashboard':page==='analytics'?'Analytics':page==='clients'?'All Clients':page==='approvals'?'Manager Approvals':page==='calendar'?'Calendar':page==='reports'?'Reports':page==='form'?'Client Form':page==='search'?'Global Search':page==='catalog'?'Service Catalog':page==='team'?'Team Board':page==='accounting'?'Accounting':page==='quotations'?'Quotations':page==='onboarding'?'Client Onboarding':'Settings'}
          </div>
          <div className="topbar-actions">
            <FirebaseStatus/>
            <div style={{fontSize:11,color:'var(--text3)',display:'flex',alignItems:'center',gap:4,padding:'4px 8px',borderRadius:8,background:'rgba(255,255,255,.04)'}}>
              <Icon n="clock" s={12}/><span>{sessionTime}</span>
            </div>
            <button className="btn btn-ghost btn-icon" onClick={toggleTheme} title="Toggle theme" style={{fontSize:15}}>{theme==='dark'?'☀️':'🌙'}</button>
            <div style={{position:'relative'}}>
              <button className="btn btn-ghost btn-icon" onClick={()=>setShowNotifs(!showNotifs)} style={{position:'relative'}}>
                <Icon n="bell" s={16}/>
                {unreadCount>0&&<span style={{position:'absolute',top:2,right:2,width:16,height:16,background:'#ef4444',borderRadius:'50%',fontSize:9,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{unreadCount}</span>}
              </button>
              {showNotifs&&<div className="notif-dropdown" style={{position:'absolute',right:0,top:'calc(100% + 8px)',width:340,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:18,boxShadow:'var(--shadow-lg)',zIndex:50,overflow:'hidden',backdropFilter:'blur(12px)'}}>
                <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14}}>Notifications</span>
                  <button className="btn btn-ghost btn-sm" onClick={clearNotifs} style={{fontSize:11}}>Mark all read</button>
                </div>
                <div style={{maxHeight:340,overflowY:'auto'}}>
                  {allNotifs.length===0?<div className="empty-state" style={{padding:'30px 20px'}}><div className="empty-icon">🔔</div><div className="empty-text">No notifications</div></div>:
                    allNotifs.slice(0,12).map(n=>(
                      <div key={n.id} className={`notif-item ${n.read?'':'unread'}`} onClick={()=>{setSelId(n.clientId);setPage('client');setShowNotifs(false);}}>
                        {!n.read&&<div className="notif-dot"/>}
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:2}}>{n.clientName}</div>
                          <div style={{fontSize:12,color:'var(--text3)'}}>{n.text}</div>
                          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{ago(n.ts)}</div>
                        </div>
                      </div>
                    ))

                </div>
              </div>}
            </div>
            <button className="btn btn-primary btn-sm" onClick={()=>{setEditClient({});setPage('form');}}>
              <Icon n="plus" s={14}/> <span>Add Client</span>
            </button>
          </div>
        </header>

        <div className="content fade-in">
          {page==='overview'&&<AdminOverview stats={stats} clients={clients} settings={settings} onSelect={id=>{setSelId(id);setPage('client');}}/>}
          {page==='clients'&&<AdminClients clients={clients} settings={settings} onSelect={id=>{setSelId(id);setPage('client');}} onEdit={c=>{setEditClient(c);setPage('form');}} onDelete={delClient} onTogglePin={togglePin}/>}
          {page==='approvals'&&<ManagerApprovalsPanel requests={settings.managerApprovals||[]} onReview={applyManagerDecision}/>}

          {page==='kanban'&&<AdminKanban clients={clients} settings={settings} onSelect={id=>{setSelId(id);setPage('client');}}/>}
          {page==='goals'&&<AdminGoals settings={settings} updSettings={updSettings} clients={clients}/>}
          {page==='timer'&&<AdminTimerPage clients={clients} settings={settings} updClient={updClient} show={show}/>}
          {page==='leaderboard'&&<AdminLeaderboard clients={clients} settings={settings}/>}
          {page==='budget'&&<AdminBudgetOverview clients={clients} settings={settings}/>}
          {page==='bulk'&&<AdminBulkMessage clients={clients} updClient={updClient} show={show}/>}
          {page==='search'&&<AdminSearch clients={clients} settings={settings} onNavigate={(id,tab)=>{if(id){setSelId(id);setPage('client');}else if(tab){setPage(tab);setSelId(null);}}}/>}
          {page==='catalog'&&<AdminServiceCatalog settings={settings} updSettings={updSettings} clients={clients} updClient={updClient} show={show}/>}
          {page==='team'&&<AdminTeamComm clients={clients} updClient={updClient} show={show} settings={settings} updSettings={updSettings}/>}
          {page==='accounting'&&<AdminAccounting clients={clients} settings={settings} updSettings={updSettings} show={show} updClient={updClient}/>}
          {page==='quotations'&&<AdminQuotations settings={settings} updSettings={updSettings} show={show}/>}
          {page==='onboarding'&&<AdminOnboardingMgr settings={settings} updSettings={updSettings} clients={clients} updClient={updClient} show={show}/>}
        </div>
      </div>

      {ToastEl}
      {showNotifs&&<div style={{position:'fixed',inset:0,zIndex:40}} onClick={()=>setShowNotifs(false)}/>}
      {cmdOpen&&<CommandPalette clients={clients} onAction={handleCmd} onClose={()=>setCmdOpen(false)}/>}
      {showGlobalSearch&&<GlobalSearchModal clients={clients} settings={settings} onNavigate={(id,tab)=>{if(id){setSelId(id);setPage('client');}else if(tab){setPage(tab);setSelId(null);}setShowGlobalSearch(false);}} onClose={()=>setShowGlobalSearch(false)}/>}
      {showShortcuts&&<ShortcutsPanel onClose={()=>setShowShortcuts(false)}/>}
    </div>
  );
}




function ClientRowItem({c,settings,onSelect,onEdit,onDelete}){
  const s=sc(c.status);

  const msgs=(c.messages||[]).filter(m=>m.sender==='client').length;
  return <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 8px',borderRadius:10,cursor:'pointer',transition:'background .15s'}} onClick={onSelect}
    onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'}
    onMouseOut={e=>e.currentTarget.style.background='transparent'}>
    <Avatar name={c.name} size={36} color={settings.brandColor||'#f8fafc'}/>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{c.name} <span style={{color:'var(--text3)',fontWeight:400}}>{c.company?`· ${c.company}`:''}</span></div>
      <div style={{fontSize:12,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.projectName||'No project'}</div>
    </div>

    <div style={{textAlign:'right',display:'none'}}>
      <div style={{fontSize:13,fontWeight:700}}>{curr(paid)}</div>
    </div>
    {msgs>0&&<span style={{background:'rgba(255,255,255,.14)',color:'#e5e7eb',borderRadius:99,padding:'2px 7px',fontSize:11,fontWeight:700}}>{msgs}</span>}
    {onEdit&&<div style={{display:'flex',gap:4}} onClick={e=>e.stopPropagation()}>
      <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>onEdit(c)}><Icon n="edit" s={13}/></button>
      <button className="btn btn-danger btn-icon btn-sm" onClick={()=>{if(confirm('Delete client?'))onDelete(c.id);}}><Icon n="trash" s={13}/></button>
    </div>}
  </div>;
}



/* ═══ CLIENT FORM ═══ */

  return <div style={{maxWidth:640}} className="fade-in">

    <div className="card space-4">
      <div className="grid-2">

        <div><label className="form-label">Email</label><input className="input" type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="client@email.com"/></div>
        <div><label className="form-label">Phone</label><input className="input" value={f.phone} onChange={e=>set('phone',e.target.value)} placeholder="+91 98765 43210"/></div>
        <div style={{gridColumn:'1/-1'}}><label className="form-label">Project Name</label><input className="input" value={f.projectName} onChange={e=>set('projectName',e.target.value)} placeholder="Website Redesign, Mobile App…"/></div>
        <div><label className="form-label">Status</label>
          <select className="input" value={f.status} onChange={e=>set('status',e.target.value)}>
            {Object.keys(STATUS).map(s=><option key={s}>{s}</option>)}
          </select>

/* ── TAB: TASKS (Kanban) ── */
function AdminTasksTab({client,upd,show}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({title:'',status:'todo',priority:'medium',dueDate:'',assignee:'',description:''});
  const tasks=client.tasks||[];
  const save=()=>{
    if(!form.title.trim())return;
    const t={...form,id:uid(),createdAt:new Date().toISOString()};
    upd(c=>addLog({...c,tasks:modal?.id?c.tasks.map(x=>x.id===modal.id?{...t,id:modal.id}:x):[...(c.tasks||[]),t]},modal?.id?`Task updated: ${t.title}`:`Task added: ${t.title}`));
    setModal(null);setForm({title:'',status:'todo',priority:'medium',dueDate:'',assignee:'',description:''});show('Task saved!');
  };
  const cols=[{k:'todo',l:'To Do',color:'#64748b'},{k:'in_progress',l:'In Progress',color:'#3b82f6'},{k:'review',l:'Review',color:'#9ca3af'},{k:'completed',l:'Done',color:'#10b981'}];
  const moveTask=(t,newStatus)=>upd(c=>({...c,tasks:c.tasks.map(x=>x.id===t.id?{...x,status:newStatus}:x)}));
  
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <div style={{fontSize:13,color:'var(--text3)'}}>{tasks.filter(t=>t.status==='completed').length}/{tasks.length} tasks complete</div>
      <button className="btn btn-primary btn-sm" onClick={()=>{setForm({title:'',status:'todo',priority:'medium',dueDate:'',assignee:'',description:''});setModal({});}}>
        <Icon n="plus" s={13}/> Add Task
      </button>
    </div>
    <div className="kanban-board">
      {cols.map(col=>{
        const colTasks=tasks.filter(t=>t.status===col.k);
        return <div key={col.k} className="kanban-col">
          <div className="kanban-col-header">
            <span style={{width:8,height:8,borderRadius:'50%',background:col.color,display:'inline-block'}}/>
            {col.l} <span style={{marginLeft:'auto',fontWeight:700,fontSize:11,color:'var(--text3)'}}>{colTasks.length}</span>
          </div>
          {colTasks.map(t=>{const p=pc(t.priority);return <div key={t.id} className="task-card" onClick={()=>{setForm({...t});setModal(t);}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:6}}>{t.title}</div>
            {t.description&&<div style={{fontSize:11,color:'var(--text3)',marginBottom:6,lineHeight:1.5}}>{t.description.slice(0,60)}{t.description.length>60?'…':''}</div>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:4}}>
              <Badge bg={p.bg} text={p.text}>{t.priority}</Badge>
              {t.dueDate&&<span style={{fontSize:11,color:'var(--text3)'}}>{fmt(t.dueDate)}</span>}
            </div>
            {col.k!=='completed'&&<div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
              {cols.filter(c=>c.k!==col.k).map(c=><button key={c.k} className="btn btn-secondary" style={{fontSize:10,padding:'3px 8px',borderRadius:6}} onClick={e=>{e.stopPropagation();moveTask(t,c.k);}}>→ {c.l}</button>)}
            </div>}
          </div>;})}
          {colTasks.length===0&&<div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:12}}>Drop tasks here</div>}
        </div>;
      })}
    </div>
    {modal!==null&&<Modal title={modal?.id?'Edit Task':'New Task'} onClose={()=>setModal(null)}>
      <div className="space-3">
        <div><label className="form-label">Task Title *</label><input className="input" placeholder="What needs to be done?" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div>
        <div className="grid-2">
          <div><label className="form-label">Status</label>
            <select className="input" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
              {cols.map(c=><option key={c.k} value={c.k}>{c.l}</option>)}
            </select>
          </div>
          <div><label className="form-label">Priority</label>
            <select className="input" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>
              {['low','medium','high'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
        </div>
        <div><label className="form-label">Due Date</label><input className="input" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/></div>
        <div><label className="form-label">Description</label><textarea className="input" placeholder="Task details…" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:8}}>
          <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
          {modal?.id&&<button className="btn btn-danger btn-sm" onClick={()=>{upd(c=>({...c,tasks:c.tasks.filter(x=>x.id!==modal.id)}));setModal(null);show('Task deleted');}}>Delete</button>}
          <button className="btn btn-primary" onClick={save}>Save Task</button>
        </div>
      </div>
    </Modal>}
  </div>;
}

/* ── TAB: FILES ── */
function AdminFilesTab({client,upd,show}){
  const [folder,setFolder]=useState('Designs');
  const [form,setForm]=useState({name:'',url:'',version:'v1',type:'link'});
  const files=client.files||[];
  const folders=['Designs','Content','Final Files','References','Contracts','Other'];
  const addFile=()=>{
    if(!form.name||!form.url)return;
    const f={...form,id:uid(),folder,addedDate:new Date().toISOString()};
    upd(c=>addLog({...c,files:[...(c.files||[]),f]},`File added: ${f.name}`));
    setForm({name:'',url:'',version:'v1',type:'link'});show('File added!');
  };
  const fileTypes={'link':'🔗','figma':'🎨','drive':'📁','doc':'📄','sheet':'📊','video':'🎬','zip':'📦'};

  return <div className="space-3">
    <div className="card card-sm">
      <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,marginBottom:12}}>Add Deliverable</h3>
