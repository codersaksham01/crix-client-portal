function AdminAccounting({clients,settings,updSettings,show,updClient}){
  const [view,setView]=React.useState('pl');
  const [dateRange,setDateRange]=React.useState('all');
  const now=new Date();
  const filterDate=inv=>{
    if(dateRange==='all')return true;
    if(!inv.createdAt)return false;
    const d=new Date(inv.createdAt);
    if(dateRange==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(dateRange==='quarter'){const q=Math.floor(now.getMonth()/3);return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear();}
    if(dateRange==='year')return d.getFullYear()===now.getFullYear();
    return true;
  };
  const allInvoices=clients.flatMap(cl=>(cl.invoices||[]).filter(filterDate).map(inv=>({...inv,clientName:cl.name||''})));
  const allExpenses=clients.flatMap(cl=>(cl.expenses||[]).map(e=>({...e,clientName:cl.name||''})));
  const totalRevenue=allInvoices.reduce((a,i)=>a+getInvoiceTotal(i),0);
  const totalCollected=allInvoices.reduce((a,i)=>a+getInvoicePaidAmount(i),0);
  const totalOutstanding=totalRevenue-totalCollected;
  const totalGST=allInvoices.reduce((a,i)=>a+Number(i.gstAmount||0),0);
  const totalExpensesAmt=allExpenses.reduce((a,e)=>a+Number(e.amount||0),0);
  const netProfit=totalCollected-totalExpensesAmt;
  const recurring=clients.flatMap(cl=>(cl.invoices||[]).filter(i=>i.recurring).map(i=>({...i,clientName:cl.name||'',clientId:cl.id})));
  const overdueInvoices=allInvoices.filter(i=>{const b=getInvoiceBalance(i);return b>0&&i.dueDate&&new Date(i.dueDate)<now;});
  const CURRENCY_SYMBOL={INR:'₹',USD:'$',EUR:'€',GBP:'£',AED:'د.إ'};
  const cs=CURRENCY_SYMBOL[settings.defaultCurrency||'INR']||'₹';
  return <div className="space-4 fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
      <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>🏦 Accounting Module</h2>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {['all','month','quarter','year'].map(d=><button key={d} className={`btn btn-sm ${dateRange===d?'btn-primary':'btn-secondary'}`} onClick={()=>setDateRange(d)}>{d.charAt(0).toUpperCase()+d.slice(1)}</button>)}
      </div>
    </div>
    <div className="grid-4">
      {[[cs+pdfCurr(totalRevenue),'Total Invoiced','💳',''],[cs+pdfCurr(totalCollected),'Collected','✅','#10b981'],[cs+pdfCurr(totalOutstanding),'Outstanding','⏳','#f59e0b'],[cs+pdfCurr(netProfit),'Net Profit',netProfit>=0?'📈':'📉',netProfit>=0?'#10b981':'#f43f5e']].map(([v,l,e,col])=><div key={l} className="card card-sm" style={{textAlign:'center'}}>
        <div style={{fontSize:24,marginBottom:4}}>{e}</div>
        <div style={{fontSize:22,fontWeight:900,color:col||'var(--text)',fontFamily:'var(--font-display)'}}>{v}</div>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{l}</div>
      </div>)}
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      {[['pl','P&L Statement'],['gst','GST Summary'],['recurring','Recurring Invoices'],['overdue','Overdue']].map(([v,l])=><button key={v} className={`btn btn-sm ${view===v?'btn-primary':'btn-secondary'}`} onClick={()=>setView(v)}>{l}</button>)}
    </div>
    {view==='pl'&&<div className="card">
      <h3 style={{fontWeight:800,fontSize:15,marginBottom:16}}>Profit & Loss Statement</h3>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:800,color:'var(--text3)',textTransform:'uppercase',marginBottom:8}}>Revenue</div>
        <div className="pl-row"><span>Invoiced</span><span className="pl-positive">{cs}{pdfCurr(totalRevenue)}</span></div>
        <div className="pl-row"><span>Collected</span><span className="pl-positive">{cs}{pdfCurr(totalCollected)}</span></div>
        <div className="pl-row"><span>Outstanding</span><span style={{color:'var(--text2)'}}>{cs}{pdfCurr(totalOutstanding)}</span></div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:800,color:'var(--text3)',textTransform:'uppercase',marginBottom:8}}>Expenses</div>
        <div className="pl-row"><span>Total Expenses</span><span className="pl-negative">{cs}{pdfCurr(totalExpensesAmt)}</span></div>
        <div className="pl-row"><span>GST Collected</span><span className="pl-positive">{cs}{pdfCurr(totalGST)}</span></div>
      </div>
      <div className="pl-row pl-total"><span style={{fontWeight:800}}>Net Profit / Loss</span><span style={{color:netProfit>=0?'#10b981':'#f43f5e',fontSize:22,fontWeight:900,fontFamily:'var(--font-display)'}}>{cs}{pdfCurr(netProfit)}</span></div>
    </div>}
    {view==='gst'&&<div className="card">
      <h3 style={{fontWeight:800,fontSize:15,marginBottom:16}}>GST Summary</h3>
      <div className="space-2">
        <div className="pl-row"><span>Total GST Collected</span><span className="pl-positive">{cs}{pdfCurr(totalGST)}</span></div>
        <div className="pl-row"><span>CGST (50%)</span><span style={{color:'var(--text2)'}}>{cs}{pdfCurr(Math.round(totalGST/2))}</span></div>
        <div className="pl-row"><span>SGST (50%)</span><span style={{color:'var(--text2)'}}>{cs}{pdfCurr(Math.round(totalGST/2))}</span></div>
        <div className="pl-row"><span>Taxable Amount (ex-GST)</span><span style={{color:'var(--text2)'}}>{cs}{pdfCurr(totalRevenue-totalGST)}</span></div>
      </div>
      <h4 style={{fontWeight:700,fontSize:13,margin:'16px 0 8px'}}>GST by Invoice</h4>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr style={{background:'var(--surface)'}}>{['Client','Invoice','Rate','GST Amt'].map(h=><th key={h} style={{padding:'8px 10px',fontSize:11,textAlign:'left',fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr></thead>
        <tbody>{allInvoices.filter(i=>i.gstAmount>0).slice(0,20).map((inv,i)=><tr key={i}><td style={{padding:'8px 10px',fontSize:12}}>{inv.clientName}</td><td style={{padding:'8px 10px',fontSize:12}}>{inv.number}</td><td style={{padding:'8px 10px',fontSize:12}}>{inv.gstRate||0}%</td><td style={{padding:'8px 10px',fontSize:12,fontWeight:700}}>{cs}{pdfCurr(inv.gstAmount)}</td></tr>)}</tbody>
      </table>
    </div>}
    {view==='recurring'&&<div className="card">
      <h3 style={{fontWeight:800,fontSize:15,marginBottom:16}}>Recurring Invoices</h3>
      {recurring.length===0?<EmptyState icon="🔄" text="No recurring invoices yet. Mark invoices as recurring in the invoice form."/>:
        <div className="space-2">{recurring.map((inv,i)=><div key={i} className="card card-sm">
          <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div><div style={{fontWeight:700}}>{inv.number} · {inv.description}</div><div style={{fontSize:12,color:'var(--text3)'}}>{inv.clientName} · {inv.recurringPeriod||'Monthly'}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontWeight:800,fontSize:16,color:'#111111'}}>{cs}{pdfCurr(inv.totalWithGst||inv.amount)}</div><span className="badge-recurring">🔄 {inv.recurringPeriod||'Monthly'}</span></div>
          </div>
        </div>)}</div>}
    </div>}
    {view==='overdue'&&<div className="card">
      <h3 style={{fontWeight:800,fontSize:15,marginBottom:16}}>Overdue Invoices ({overdueInvoices.length})</h3>
      {overdueInvoices.length===0?<EmptyState icon="✅" text="No overdue invoices! Great work."/>:
        <div className="space-2">{overdueInvoices.map((inv,i)=>{const bal=getInvoiceBalance(inv);const days=Math.round((now-new Date(inv.dueDate))/(86400000));return <div key={i} className="card card-sm" style={{borderColor:'rgba(244,63,94,.3)'}}>
          <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div><div style={{fontWeight:700}}>{inv.number} · {inv.description}</div><div style={{fontSize:12,color:'var(--text3)'}}>{inv.clientName}</div></div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:800,fontSize:16,color:'#f43f5e'}}>{cs}{pdfCurr(bal)}</div>
              <div style={{fontSize:11,color:'#f43f5e'}}>{days} day{days!==1?'s':''} overdue</div>
              <WhatsAppBtn phone={clients.find(cl=>(cl.invoices||[]).find(x=>x.id===inv.id))?.phone} message={`Dear client, your invoice ${inv.number} of ₹${pdfCurr(bal)} is overdue by ${days} days. Please make the payment at your earliest convenience. - Crixy Ai`} label="Send Reminder" size="xs"/>
            </div>
          </div>
        </div>;})}
      </div>}
    </div>}
  </div>;
}

/* ════════════════════════════════════════════
   ONBOARDING MANAGER PAGE
════════════════════════════════════════════ */
function AdminOnboardingMgr({settings,updSettings,clients,updClient,show}){
  const [form,setForm]=React.useState({title:'',description:'',order:1});
  const [modal,setModal]=React.useState(null);
  const steps=settings.onboardingSteps||[];
  const save=()=>{
    if(!form.title)return show('Title required');
    const step={...form,id:uid(),order:steps.length+1};
    const updated=modal?.id?steps.map(s=>s.id===modal.id?{...s,...step,id:modal.id}:s):[...steps,step];
    updSettings(p=>({...p,onboardingSteps:updated}));
    setModal(null);setForm({title:'',description:'',order:1});show('Step saved!');
  };
  const del=id=>updSettings(p=>({...p,onboardingSteps:(p.onboardingSteps||[]).filter(s=>s.id!==id)}));
  const clientProgress=clients.map(cl=>{const done=(cl.onboardingProgress||[]);return{...cl,done:done.length,total:steps.length,pct:steps.length?Math.round(done.length/steps.length*100):0};}).filter(cl=>cl.total>0);
  return <div className="space-4 fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
      <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>🚀 Client Onboarding</h2>
      <button className="btn btn-primary" onClick={()=>{setForm({title:'',description:'',order:steps.length+1});setModal({});}}>+ Add Step</button>
    </div>
    <div className="grid-2">
      <div className="card">
        <h3 style={{fontWeight:800,fontSize:14,marginBottom:14}}>Onboarding Template ({steps.length} steps)</h3>
        {steps.length===0?<EmptyState icon="🚀" text="Add onboarding steps to get started"/>:
          <div className="space-2">{steps.sort((a,b)=>(a.order||0)-(b.order||0)).map((step,i)=><div key={step.id} className="card card-sm" style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:'rgba(255,255,255,.12)',color:'#d1d5db',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{step.title}</div>
              {step.description&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{step.description}</div>}
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setForm({...step});setModal(step);}}>✏️</button>
              <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>del(step.id)}>🗑️</button>
            </div>
          </div>)}</div>}
      </div>
      <div className="card">
        <h3 style={{fontWeight:800,fontSize:14,marginBottom:14}}>Client Progress</h3>
        {clientProgress.length===0?<EmptyState icon="📊" text="No client onboarding data yet"/>:
          <div className="space-2">{clientProgress.map(cl=><div key={cl.id} className="card card-sm">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontWeight:700,fontSize:13}}>{cl.name}</span>
              <span style={{fontSize:12,color:'var(--text3)'}}>{cl.done}/{cl.total} steps</span>
            </div>
            <div style={{height:6,background:'var(--surface2)',borderRadius:999,overflow:'hidden'}}>
              <div style={{height:'100%',width:cl.pct+'%',background:'linear-gradient(90deg,#f8fafc,#9ca3af)',borderRadius:999,transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:11,color:cl.pct===100?'#10b981':'var(--text4)',marginTop:4,fontWeight:cl.pct===100?700:400}}>{cl.pct===100?'✅ Complete':cl.pct+'% done'}</div>
          </div>)}</div>}
      </div>
    </div>
    {modal!==null&&<Modal title={modal?.id?'Edit Step':'New Onboarding Step'} onClose={()=>setModal(null)}>
      <div className="space-3">
        <input className="input" placeholder="Step Title *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
        <textarea className="input" rows="2" placeholder="Description (optional)" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={save}>Save Step</button>
        </div>
      </div>
    </Modal>}
  </div>;
}

   CHAT TAB (Real-time enhanced messages)

function AdminChatTab({client,upd,show,settings}){
  const [msg,setMsg]=React.useState('');
  const [typing,setTyping]=React.useState(false);
  const bottomRef=React.useRef(null);
  const msgs=client.messages||[];
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs.length]);
  const send=()=>{
    if(!msg.trim())return;
    const m={id:uid(),text:msg.trim(),sender:'admin',by:'Admin',ts:new Date().toISOString(),read:false};
    upd(c=>addLog({...c,messages:[...(c.messages||[]),m]},'Admin sent message: '+msg.trim().slice(0,40)));
    setMsg('');
  };
  const unread=msgs.filter(m=>m.sender==='client'&&!m.read).length;
  const markRead=()=>{
    if(!unread)return;
    upd(c=>({...c,messages:c.messages.map(m=>m.sender==='client'?{...m,read:true}:m)}));
  };
  React.useEffect(()=>{markRead();},[]);
  const waMsg=`Hi ${client.name||''}! This is Crixy Ai. We have sent you a message in your client portal. Please check your dashboard for updates.`;
  return <div className="space-3">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div>
        <h3 style={{fontWeight:800,fontSize:15}}>💬 Project Chat</h3>
        <div style={{fontSize:12,color:'var(--text3)'}}>{msgs.length} messages · {unread} unread from client</div>
      </div>
      <div style={{display:'flex',gap:6}}>
        <WhatsAppBtn phone={client.phone} message={waMsg} label="Notify on WhatsApp" size="xs"/>
        <CopyBtn text={`${window.location.origin}${window.location.pathname}?client=${client.id}`} label="Share Portal Link"/>
      </div>
    </div>
    <div className="chat-wrap">
      <div className="chat-messages">
        {msgs.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)',fontSize:13}}>No messages yet. Start the conversation!</div>}
        {msgs.map((m,i)=>{const isAdmin=m.sender==='admin'||m.by==='Admin'||m.by==='Manager'||m.by==='Staff';return <div key={m.id||i} style={{display:'flex',flexDirection:'column',alignItems:isAdmin?'flex-end':'flex-start'}}>
          <div className={`chat-bubble ${isAdmin?'admin':'client'}`}>
            {m.text||m.content||m.message||''}
            <div className="chat-bubble-meta">{isAdmin?'Admin':'Client'} · {m.ts?new Date(m.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):''}{isAdmin&&<span style={{marginLeft:4}}>{m.read?'✓✓':'✓'}</span>}</div>
          </div>
        </div>;})}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-bar">
        <input className="input" style={{flex:1,fontSize:13}} placeholder="Type a message..." value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} />
        <button className="btn btn-primary" onClick={send} disabled={!msg.trim()}>Send</button>
      </div>
    </div>
  </div>;
}

    <div className="card card-sm">

      <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
        <select className="input" style={{width:140}} value={tag} onChange={e=>setTag(e.target.value)}>
          {TAGS.map(t=><option key={t}>{t}</option>)}
        </select>
        <button className="btn btn-primary btn-sm" onClick={add}>Save Note</button>
      </div>
    </div>
    {notes.length===0?<EmptyState icon="🔒" text="No internal notes yet"/>:
      <div className="space-2">{notes.slice().reverse().map(n=><div key={n.id} className="internal-note">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <span style={{background:tagColors[n.tag]||'#f8fafc',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:999}}>{n.tag}</span>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>del(n.id)}>🗑️</button>
        </div>
        <div style={{fontSize:13,color:'var(--text)',marginTop:8,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{n.text}</div>
        <div className="internal-note-meta">{n.author||'Admin'} · {fmt(n.createdAt)}</div>
      </div>)}</div>}
  </div>;
}

/* ════════════════════════════════════════════
   ONBOARDING TAB (per client)
════════════════════════════════════════════ */
function AdminOnboardingTab({client,upd,show,settings}){
  const steps=settings.onboardingSteps||[];
  const done=new Set(client.onboardingProgress||[]);
  const toggle=id=>{
    const newDone=done.has(id)?[...done].filter(x=>x!==id):[...done,id];
    upd(c=>addLog({...c,onboardingProgress:newDone},`Onboarding step ${done.has(id)?'unchecked':'completed'}: ${steps.find(s=>s.id===id)?.title||id}`));
  };
  const pct=steps.length?Math.round(done.size/steps.length*100):0;
  const waMsg=`Hi ${client.name||''}! Great news — you've completed ${pct}% of your onboarding with Crixy Ai. ${pct<100?'Let\'s schedule a quick call to complete the remaining steps!':'You\'re all set! Welcome aboard 🎉'}`;
  return <div className="space-3">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div>
        <h3 style={{fontWeight:800,fontSize:15}}>🚀 Client Onboarding</h3>
        <div style={{fontSize:12,color:'var(--text3)'}}>{done.size} of {steps.length} steps completed</div>
      </div>
      <WhatsAppBtn phone={client.phone} message={waMsg} label="Update Client" size="xs"/>
    </div>
    {steps.length===0?<div className="card card-sm" style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontSize:13}}>
      No onboarding steps configured. <br/>Go to <strong>Onboarding</strong> page to set up your template.
    </div>:<>
      <div style={{marginBottom:4}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text3)',marginBottom:6}}>
          <span>Progress</span><span style={{fontWeight:700,color:pct===100?'#10b981':'var(--text2)'}}>{pct}%</span>
        </div>
        <div style={{height:8,background:'var(--surface2)',borderRadius:999,overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#f8fafc,#9ca3af)',borderRadius:999,transition:'width .4s'}}/>
        </div>
        {pct===100&&<div style={{marginTop:8,color:'#10b981',fontWeight:700,fontSize:13}}>🎉 Onboarding Complete!</div>}
      </div>
      <div className="space-2">{steps.sort((a,b)=>(a.order||0)-(b.order||0)).map(step=><div key={step.id} className={`onboard-step${done.has(step.id)?' done':''}`}>
        <div className="onboard-check" onClick={()=>toggle(step.id)}>{done.has(step.id)&&'✓'}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,textDecoration:done.has(step.id)?'line-through':'none',opacity:done.has(step.id)?.6:1}}>{step.title}</div>
          {step.description&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{step.description}</div>}
        </div>
      </div>)}</div>
    </>}
  </div>;
}

function StaffApp({onSwitchPanel}){

function ClientPortalApp({clientId}){
  const [client,setClient]=useState(null);
  const [settings,setSettings]=useState(DEF_SETTINGS);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [portalMenu,setPortalMenu]=useState(false);
  const [showMoreNav,setShowMoreNav]=useState(false);
  const {show,ToastEl}=useToast();

  useEffect(()=>{
    const fetchClient = db()
      ? db().collection(FS_COL).doc(clientId).get().then(snap=>snap.exists?normalizeClientData({id:snap.id,...snap.data()}):null).catch(()=>null)
      : Promise.resolve(null);
    Promise.all([getSettings(), fetchClient]).then(([s,clientData])=>{
      setSettings(s);
      if(clientData) setClient(clientData);
      else {
        // Fallback: try localStorage
        const all = (()=>{try{const d=localStorage.getItem('ut_clients_v3');return d?JSON.parse(d):[];}catch{return[];}})();
        const found = all.find(c=>c.id===clientId);
        if(found) setClient(normalizeClientData(found));
      }
      setLoading(false);
    }).catch(()=>{setLoading(false);});
  },[clientId]);

  // Real-time updates for client
  useEffect(()=>{
    if(!clientId||!db())return;
    const unsub=db().collection(FS_COL).doc(clientId).onSnapshot(snap=>{
      if(snap.exists)setClient(normalizeClientData({id:snap.id,...snap.data()}));
    },()=>{});
    return()=>unsub();
  },[clientId]);

  const updClient=fn=>{
    const updated=normalizeClientData(fn(client));
    setClient(updated);
    saveClient(updated);
  };

  if(loading)return<Loader/>;
  if(!client)return <div className="login-page">
    <div className="login-card" style={{textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:12}}>🔍</div>
      <h2 style={{fontFamily:'var(--font-display)',fontWeight:800}}>Portal Not Found</h2>
      <p style={{color:'var(--text3)',marginTop:8}}>This client portal link is invalid or has expired.</p>
    </div>
  </div>;

  const unread=(client.notifications||[]).filter(n=>!n.read).length;
  const markRead=()=>{updClient(c=>({...c,notifications:(c.notifications||[]).map(n=>({...n,read:true}))}));};

  const primaryNav=[
    {id:'dashboard',label:'Dashboard',icon:'dashboard'},
    {id:'messages',label:'Messages',icon:'message'},
    {id:'invoices',label:'Invoices',icon:'invoice'},
    {id:'project',label:'My Project',icon:'project'},
    {id:'files',label:'Files',icon:'files'},
    {id:'approvals',label:'Approvals',icon:'check'},
    ...(client.websiteChangeRequestEnabled?[{id:'requests',label:'Website Changes',icon:'support'}]:[]),
    {id:'tickets',label:'Support',icon:'support'},
  ];
  const secondaryNav=[
    {id:'proposals',label:'Proposals',icon:'note'},
    {id:'contracts',label:'Contracts',icon:'contract'},
    {id:'announcements',label:'Announcements',icon:'bell'},
    {id:'feedback',label:'Feedback',icon:'feedback'},
    {id:'activity',label:'Activity',icon:'analytics'},
    {id:'onboarding',label:'Onboarding',icon:'onboard'},
    {id:'nps',label:'Rate Us',icon:'star'},
    {id:'budget',label:'Payments',icon:'dollar'},
  ];
  const activeInSecondary=secondaryNav.some(n=>n.id===page);

  return <div className="portal-page" style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
    {/* Header */}
    <header className="portal-header">
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="btn btn-ghost btn-icon" onClick={()=>setPortalMenu(!portalMenu)} style={{flexShrink:0}}><Icon n="menu" s={18}/></button>
        <div className="logo-frame logo-frame-sm">
          <img src={LOGO_B64} alt="Crixy Ai logo"/>
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{settings.businessName}</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {unread>0&&<button className="btn btn-ghost btn-icon" onClick={markRead} style={{position:'relative'}}>
          <Icon n="bell" s={16}/>
          <span style={{position:'absolute',top:2,right:2,width:16,height:16,background:'#ef4444',borderRadius:'50%',fontSize:9,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{unread}</span>
        </button>}
        <Avatar name={client.name} size={30} color={settings.brandColor||'#f8fafc'}/>
      </div>
    </header>

    {/* Mobile menu overlay */}
    {portalMenu&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:99,backdropFilter:'blur(2px)'}} onClick={()=>setPortalMenu(false)}/>}

    {/* Slide-in sidebar menu */}
    <div style={{position:'fixed',top:0,left:0,bottom:0,width:260,background:'var(--bg2)',borderRight:'1px solid var(--border)',zIndex:100,transform:portalMenu?'translateX(0)':'translateX(-100%)',transition:'transform .25s ease',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'20px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Avatar name={client.name} size={40} color={settings.brandColor||'#f8fafc'}/>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14}}>{client.name}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{client.company||client.projectName||'Client Portal'}</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:8,overflowY:'auto'}}>
        {primaryNav.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>{setPage(n.id);setPortalMenu(false);}}>
          <Icon n={n.icon} s={16}/><span>{n.label}</span>
          {n.id==='messages'&&(client.messages||[]).filter(m=>m.sender==='admin').length>0&&<span className="nav-badge">{(client.messages||[]).filter(m=>m.sender==='admin').length}</span>}
          {n.id==='tickets'&&(client.tickets||[]).filter(t=>t.status==='open').length>0&&<span className="nav-badge">{(client.tickets||[]).filter(t=>t.status==='open').length}</span>}
          {n.id==='approvals'&&(client.approvals||[]).filter(a=>a.status==='pending').length>0&&<span className="nav-badge">{(client.approvals||[]).filter(a=>a.status==='pending').length}</span>}
        </div>)}
        <div className="nav-item" style={{marginTop:4,color:activeInSecondary?'#e5e7eb':'var(--text3)',fontSize:12}} onClick={()=>setShowMoreNav(v=>!v)}>
          <span style={{fontSize:10,lineHeight:1}}>{showMoreNav||activeInSecondary?'▲':'▼'}</span>
          <span>{showMoreNav||activeInSecondary?'Less':'More'}</span>
        </div>
        {(showMoreNav||activeInSecondary)&&secondaryNav.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} style={{paddingLeft:18,opacity:.85}} onClick={()=>{setPage(n.id);setPortalMenu(false);}}>
          <Icon n={n.icon} s={15}/><span>{n.label}</span>
        </div>)}
      </nav>
      <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}><img src={LOGO_B64} alt="" className="logo-inline"/> {settings.businessName}</div>
      </div>
    </div>

    {/* Content */}
    <div className="portal-content" style={{flex:1,overflow:'auto'}}>
      {page==='dashboard'&&<PortalDashboardPremium client={client} settings={settings} onNav={setPage}/>}
      {page==='project'&&<PortalProject client={client}/>}
      {page==='files'&&<PortalFiles client={client}/>}
      {page==='messages'&&<PortalMessagesPlus client={client} updClient={updClient} settings={settings}/>}
      {page==='proposals'&&<PortalProposals client={client} updClient={updClient} show={show} settings={settings}/>}
      {page==='invoices'&&<PortalInvoicesPlus client={client}/>}
      {page==='approvals'&&<PortalApprovals client={client} updClient={updClient} show={show}/>}
      {page==='requests'&&client.websiteChangeRequestEnabled&&<PortalRequests client={client} updClient={updClient} show={show}/>}
      {page==='contracts'&&<PortalContracts client={client} updClient={updClient} show={show}/>}
      {page==='announcements'&&<PortalAnnouncements client={client}/>}
      {page==='activity'&&<PortalActivity client={client} settings={settings}/>}
      {page==='tickets'&&<PortalTickets client={client} updClient={updClient} show={show}/>}
      {page==='feedback'&&<PortalFeedbackPlus client={client} updClient={updClient} show={show}/>}
      {page==='onboarding'&&<PortalOnboarding client={client} updClient={updClient} show={show}/>}
      {page==='nps'&&<PortalNPS client={client} updClient={updClient} show={show}/>}
      {page==='budget'&&<PortalBudget client={client}/>}
    </div>
    <PortalBottomNav page={page} setPage={setPage} setMenu={setPortalMenu} client={client}/>
    {ToastEl}
  </div>;
}


function PortalDashboardPremium({client,settings,onNav}){
  const tasks=client.tasks||[];
  const invoices=client.invoices||[];
  const tickets=client.tickets||[];
  const total=invoices.reduce((a,i)=>a+getInvoiceTotal(i),0);
  const paid=invoices.reduce((a,i)=>a+getInvoicePaidAmount(i),0);
  const balance=Math.max(0,total-paid);
  const completeTasks=tasks.filter(t=>t.status==='completed').length;
  const openTickets=tickets.filter(t=>t.status==='open').length;
  const pendingApprovals=(client.approvals||[]).filter(a=>a.status==='pending').length;
  const nextInvoice=invoices.find(i=>getInvoiceBalance(i)>0)||invoices[0];
  const nextActions=[
    {title:pendingApprovals?'Review Pending Approval':'Open Project Board',copy:pendingApprovals?`${pendingApprovals} decision${pendingApprovals>1?'s':''} waiting for you.`:'Track tasks, milestones, and delivery status.',icon:pendingApprovals?'check':'project',nav:pendingApprovals?'approvals':'project'},
    {title:balance>0?'Pay Outstanding Balance':'View Invoices',copy:balance>0?`${curr(balance)} pending. UPI and QR details are inside invoices.`:'All payments are looking clean right now.',icon:'invoice',nav:'invoices'},
    {title:openTickets?'Check Support Tickets':'Message The Team',copy:openTickets?`${openTickets} support ticket${openTickets>1?'s':''} currently open.`:'Send files, notes, or questions directly to Crixy Ai.',icon:openTickets?'support':'message',nav:openTickets?'tickets':'messages'}
  ];
  return <div className="space-4 fade-in">
    <section className="portal-hero">
      <div className="portal-hero-main">
        <div>
          <div className="portal-kicker">{settings.businessName||'Crixy Ai'} Client Portal</div>
          <h1 className="portal-title">Welcome back, {(client.name||'').split(' ')[0]||'there'}</h1>
          <p className="portal-subtitle">{client.projectName||'Your project workspace'} is at {client.progress||0}% completion. Use the next actions below to approve work, clear payments, or message the team.</p>
          <div className="portal-action-row">
            <button className="btn btn-primary" onClick={()=>onNav&&onNav(nextActions[0].nav)}><Icon n={nextActions[0].icon} s={15}/> Next Action</button>
            <button className="btn btn-secondary" onClick={()=>onNav&&onNav('messages')}><Icon n="message" s={15}/> Contact Team</button>
            {nextInvoice&&<button className="btn btn-secondary" onClick={()=>onNav&&onNav('invoices')}><Icon n="invoice" s={15}/> Invoice {nextInvoice.number}</button>}
          </div>
        </div>
        <div className="portal-brand-mark"><img src={LOGO_B64} alt="Crixy Ai logo"/></div>
      </div>
    </section>
    <div className="portal-metric-grid">
      {[
        ['Progress',`${client.progress||0}%`,client.status||'Project status','project'],
        ['Tasks Done',`${completeTasks}/${tasks.length}`,tasks.length?`${Math.max(0,tasks.length-completeTasks)} remaining`:'No tasks yet','check'],
        ['Amount Paid',curr(paid),balance>0?`${curr(balance)} due`:'Fully clear','invoice'],
        ['Support',String(openTickets),openTickets?'Open tickets':'No open tickets','support']
      ].map(([l,v,note,icon])=><div key={l} className="portal-metric"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}><div className="portal-metric-label">{l}</div><Icon n={icon} s={16}/></div><div className="portal-metric-value">{v}</div><div className="portal-metric-note">{note}</div></div>)}
    </div>
    <div className="portal-next-actions">

/* ── PORTAL: TICKETS ── */
function PortalTickets({client,updClient,show}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({subject:'',description:'',priority:'medium'});
  const tickets=client.tickets||[];
  const create=()=>{
    if(!form.subject||!form.description)return;
    const t={...form,id:uid(),status:'open',createdAt:new Date().toISOString(),replies:[]};
    updClient(c=>addLog({...c,tickets:[...(c.tickets||[]),t]},`Support ticket raised: ${t.subject}`));
    setModal(false);setForm({subject:'',description:'',priority:'medium'});show('Ticket submitted!');
  };
  return <div className="space-4 fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20}}>Support Tickets</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}><Icon n="plus" s={13}/> New Ticket</button>
    </div>
    {tickets.length===0?<div className="empty-state"><div className="empty-icon">🎫</div><div className="empty-text">No support tickets. Need help? Raise a ticket!</div></div>:
      tickets.map(t=><div key={t.id} className="card card-sm">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <div style={{fontWeight:700,fontSize:14}}>{t.subject}</div>
          <div style={{display:'flex',gap:6}}>
            <Badge bg={pc(t.priority).bg} text={pc(t.priority).text}>{t.priority}</Badge>
            <Badge bg={t.status==='open'?'rgba(239,68,68,.15)':'rgba(16,185,129,.15)'} text={t.status==='open'?'#fca5a5':'#6ee7b7'}>{t.status}</Badge>
          </div>
        </div>
        <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.5,marginBottom:8}}>{t.description}</p>
        <div style={{fontSize:11,color:'var(--text3)'}}>{ago(t.createdAt)}</div>
        {(t.replies||[]).length>0&&<div style={{marginTop:10,padding:10,background:'rgba(255,255,255,.04)',borderRadius:8,fontSize:12}}>
          {t.replies.slice(-1).map(r=><div key={r.id}>
            <div style={{color:'var(--text3)',marginBottom:3,fontWeight:600}}>{r.sender==='admin'?'Project Team':'You'} · {ago(r.ts)}</div>
            <div style={{color:'var(--text)'}}>{r.text}</div>
          </div>)}
        </div>}
      </div>)}
    {modal&&<Modal title="Raise Support Ticket" onClose={()=>setModal(false)}>
      <div className="space-3">
        <div><label className="form-label">Subject *</label><input className="input" placeholder="Brief description of the issue" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}/></div>
        <div><label className="form-label">Description *</label><textarea className="input" rows="4" placeholder="Describe the issue in detail…" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div><label className="form-label">Priority</label>
          <select className="input" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>
            {['low','medium','high'].map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn btn-primary" onClick={create}>Submit Ticket</button>
        </div>
      </div>
    </Modal>}
  </div>;
}

          {form[item.k]&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}

/* ── PORTAL: FEEDBACK ── */
function PortalFeedback({client,updClient,show}){
  const feedback=(client.feedback||[]).filter(f=>f.response===null);
  const answered=(client.feedback||[]).filter(f=>f.response!==null);
  const respond=(id,response)=>{updClient(c=>addLog({...c,feedback:(c.feedback||[]).map(f=>f.id===id?{...f,response}:f)},'Feedback submitted'));show('Feedback submitted!');};
  const [ratings,setRatings]=useState({});const [texts,setTexts]=useState({});
  return <div className="space-4 fade-in">
    <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20}}>Feedback</h2>
    {feedback.length===0&&answered.length===0?<EmptyState icon="⭐" text="No feedback requests yet."/>:null}
    {feedback.length>0&&<div className="space-3">
      <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15}}>Pending</h3>
      {feedback.map(f=><div key={f.id} className="card card-sm">
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>{f.question}</div>
        {f.type==='rating'&&<div style={{display:'flex',gap:4,marginBottom:8}}>{[1,2,3,4,5].map(s=><span key={s} style={{fontSize:28,cursor:'pointer',color:s<=(ratings[f.id]||0)?'#fbbf24':'var(--text3)',transition:'.1s'}} onClick={()=>setRatings(p=>({...p,[f.id]:s}))}>★</span>)}</div>}
        {f.type==='text'&&<textarea className="input" rows="2" placeholder="Your response…" value={texts[f.id]||''} onChange={e=>setTexts(p=>({...p,[f.id]:e.target.value}))} style={{marginBottom:8}}/>}
        {f.type==='yesno'&&<div style={{display:'flex',gap:8,marginBottom:8}}><button className="btn btn-success btn-sm" onClick={()=>respond(f.id,'Yes')}>Yes</button><button className="btn btn-danger btn-sm" onClick={()=>respond(f.id,'No')}>No</button></div>}
        {f.type!=='yesno'&&<button className="btn btn-primary btn-sm" onClick={()=>{const val=f.type==='rating'?ratings[f.id]:texts[f.id];if(val)respond(f.id,val);}}>Submit</button>}
      </div>)}
    </div>}
    {answered.length>0&&<div className="space-3">
      <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15}}>Completed</h3>
      {answered.map(f=><div key={f.id} className="card card-sm" style={{opacity:.7}}>
        <div style={{fontWeight:600,fontSize:13}}>{f.question}</div>
        <div style={{marginTop:6,fontSize:13,color:'var(--text2)'}}>Your response: {f.type==='rating'?'★'.repeat(f.response):String(f.response)}</div>
      </div>)}
    </div>}
  </div>;
}

  const clientId=params.get('client');
  const [panel,setPanel]=useState(()=>{try{return localStorage.getItem('ut_panel_mode')||'admin';}catch{return'admin';}});
  const switchPanel=next=>{setPanel(next);try{localStorage.setItem('ut_panel_mode',next);}catch{}};
  if(clientId)return <ClientPortalApp clientId={clientId}/>;
  if(panel==='manager')return <ManagerApp onSwitchPanel={switchPanel}/>;
  if(panel==='staff')return <StaffApp onSwitchPanel={switchPanel}/>;
  return <AdminApp onSwitchPanel={switchPanel}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
