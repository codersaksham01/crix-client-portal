        {folders.map(f=><button key={f} className={`btn btn-sm ${folder===f?'btn-primary':'btn-secondary'}`} onClick={()=>setFolder(f)}>{f}</button>)}
      </div>
      <div className="grid-2" style={{gap:8}}>
        <input className="input" placeholder="File / document name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
        <input className="input" placeholder="URL (Drive, Figma, etc.) *" value={form.url} onChange={e=>setForm(p=>({...p,url:e.target.value}))}/>
        <input className="input" placeholder="Version (e.g. v2.1)" value={form.version} onChange={e=>setForm(p=>({...p,version:e.target.value}))}/>
        <select className="input" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
          {Object.entries(fileTypes).map(([k,v])=><option key={k} value={k}>{v} {k}</option>)}
        </select>
      </div>
      <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={addFile}><Icon n="plus" s={13}/> Add File</button>
    </div>
    {folders.map(f=>{
      const ff=files.filter(x=>x.folder===f);
      if(!ff.length)return null;
      return <div key={f} className="card card-sm">
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--text2)'}}>📁 {f} <span style={{color:'var(--text3)',fontWeight:400}}>({ff.length})</span></h4>
        <div className="space-2">
          {ff.map(file=><div key={file.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,transition:'background .15s'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
            onMouseOut={e=>e.currentTarget.style.background='transparent'}>
            <span style={{fontSize:18}}>{fileTypes[file.type]||'🔗'}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13}}>{file.name} <span style={{color:'var(--text3)',fontSize:11,fontWeight:400}}>{file.version}</span></div>
              <a href={file.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:'#d1d5db',textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{file.url}</a>
            </div>
            <span style={{fontSize:11,color:'var(--text3)'}}>{fmt(file.addedDate)}</span>
            <button className="btn btn-danger btn-icon btn-sm" onClick={()=>upd(c=>({...c,files:c.files.filter(x=>x.id!==file.id)}))}><Icon n="trash" s={12}/></button>
          </div>)}
        </div>
      </div>;
    })}
    {files.length===0&&<div className="empty-state"><div className="empty-icon">📁</div><div className="empty-text">No files added yet.</div></div>}
  </div>;
}

/* ── TAB: MESSAGES ── */
function AdminMessagesTab({client,upd,settings}){
  const [msg,setMsg]=useState('');
  const [attachmentName,setAttachmentName]=useState('');
  const [attachmentUrl,setAttachmentUrl]=useState('');
  const ref=useRef();
  const messages=client.messages||[];
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[messages.length]);
  const send=()=>{
    if(!msg.trim())return;
    const attachments=attachmentUrl.trim()?[{name:attachmentName.trim()||'Attachment',url:attachmentUrl.trim()}]:[];
    const m={id:uid(),sender:'admin',senderName:settings.businessName,text:msg.trim(),attachments,ts:new Date().toISOString()};
    upd(c=>addLog({...c,messages:[...(c.messages||[]),m]},`You: "${msg.slice(0,50)}"`));
    setMsg('');setAttachmentName('');setAttachmentUrl('');
  };
  return <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 300px)',minHeight:300}}>
    <div ref={ref} style={{flex:1,overflowY:'auto',marginBottom:12,paddingRight:4}} className="space-2">
      {messages.length===0?<div className="empty-state" style={{padding:'60px 0'}}><div className="empty-icon">💬</div><div className="empty-text">No messages yet. Start the conversation!</div></div>:
        messages.map(m=><div key={m.id} style={{display:'flex',justifyContent:m.sender==='admin'?'flex-end':'flex-start',gap:8,alignItems:'flex-end'}}>
          {m.sender!=='admin'&&<Avatar name={client.name} size={28} color='#475569'/>}
          <div>
            <div className={`chat-bubble ${m.sender==='admin'?'sent':'recv'}`} style={m.sender==='admin'?{background:settings.brandColor||'#f8fafc'}:{}}>
              <div>{m.text}</div>
              <AttachmentList attachments={m.attachments||[]}/>
            </div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:3,textAlign:m.sender==='admin'?'right':'left'}}>{ago(m.ts)}</div>
          </div>
        </div>)}
    </div>
    <div className="space-2">
      <div className="grid-2" style={{gap:8}}>
        <input className="input" placeholder="Attachment label (optional)" value={attachmentName} onChange={e=>setAttachmentName(e.target.value)}/>
        <input className="input" placeholder="Attachment URL (optional)" value={attachmentUrl} onChange={e=>setAttachmentUrl(e.target.value)}/>
      </div>
    </div>
    <div style={{display:'flex',gap:8}}>
      <input className="input" placeholder="Type a message to client…" value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}/>
      <button className="btn btn-primary" onClick={send}><Icon n="send" s={16}/></button>
    </div>
  </div>;
}

function AdminProposalsTab({client,upd,show,settings}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({title:'',description:'',amount:'',validUntil:'',status:'draft'});
  const proposals=client.proposals||[];
  const save=()=>{
    if(!form.title||!form.amount)return;
    const proposal={...form,id:uid(),amount:parseFloat(form.amount)||0,createdAt:new Date().toISOString(),items:[{label:form.description||form.title,amount:parseFloat(form.amount)||0}]};
    upd(c=>addLog({...c,proposals:modal?.id?c.proposals.map(x=>x.id===modal.id?{...proposal,id:modal.id,createdAt:x.createdAt}:x):[...(c.proposals||[]),proposal]},`Proposal ${modal?.id?'updated':'created'}: ${proposal.title}`));
    setModal(null);setForm({title:'',description:'',amount:'',validUntil:'',status:'draft'});show('Proposal saved!');
  };
  const convertToInvoice=proposal=>{
    const invoice={id:uid(),description:proposal.title,amount:proposal.amount,dueDate:proposal.validUntil||'',status:'draft',notes:proposal.description||'',gstEnabled:true,gstRate:settings.taxRate||18,gstAmount:Math.round((proposal.amount||0)*(settings.taxRate||18)/100),totalWithGst:Math.round((proposal.amount||0)*(1+(settings.taxRate||18)/100)),number:`${settings.invoicePrefix||'INV'}-${String((client.invoices||[]).length+1).padStart(3,'0')}`,createdAt:new Date().toISOString(),payments:[],reminders:[],receiptUrl:''};
    upd(c=>addLog({...c,proposals:c.proposals.map(x=>x.id===proposal.id?{...x,status:'converted'}:x),invoices:[...(c.invoices||[]),invoice]},`Proposal converted to invoice: ${proposal.title}`));
    show('Proposal converted to invoice');
  };
  return <div className="space-3">
    <div style={{display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
      <button className="btn btn-secondary btn-sm" onClick={()=>proposals[0]&&downloadProposalPDF(proposals[0],client,settings)}><Icon n="download" s={13}/> Export Latest PDF</button>
      <button className="btn btn-primary btn-sm" onClick={()=>setModal({})}><Icon n="plus" s={13}/> New Proposal</button>
    </div>
    {proposals.length===0?<EmptyState icon="🧾" text="No proposals yet."/>:
      proposals.map(p=><div key={p.id} className="card card-sm">
        <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start'}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{p.title}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{curr(p.amount)}{p.validUntil&&` · Valid until ${fmt(p.validUntil)}`}</div>
            {p.description&&<p style={{fontSize:12,color:'var(--text2)',marginTop:8,lineHeight:1.5}}>{p.description}</p>}
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <Badge bg="rgba(255,255,255,.10)" text="#e5e7eb">{p.status}</Badge>
            <button className="btn btn-secondary btn-sm" onClick={()=>downloadProposalPDF(p,client,settings)}><Icon n="download" s={12}/> PDF</button>
            {p.status==='accepted'&&<button className="btn btn-success btn-sm" onClick={()=>convertToInvoice(p)}>Convert</button>}
            <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setForm({title:p.title,description:p.description||'',amount:String(p.amount||''),validUntil:p.validUntil||'',status:p.status||'draft'});setModal(p);}}><Icon n="edit" s={12}/></button>
            <button className="btn btn-danger btn-icon btn-sm" onClick={()=>upd(c=>({...c,proposals:c.proposals.filter(x=>x.id!==p.id)}))}><Icon n="trash" s={12}/></button>
          </div>
        </div>
      </div>)}
    {modal!==null&&<Modal title={modal?.id?'Edit Proposal':'New Proposal'} onClose={()=>setModal(null)}>
      <div className="space-3">
        <div><label className="form-label">Title *</label><input className="input" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div>
        <div><label className="form-label">Description / Scope</label><textarea className="input" rows="3" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div className="grid-2">
          <div><label className="form-label">Quoted Amount *</label><input className="input" type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div>
          <div><label className="form-label">Valid Until</label><input className="input" type="date" value={form.validUntil} onChange={e=>setForm(p=>({...p,validUntil:e.target.value}))}/></div>
        </div>
        <div><label className="form-label">Status</label><select className="input" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>{['draft','sent','accepted','rejected','expired','converted'].map(s=><option key={s}>{s}</option>)}</select></div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Proposal</button></div>
      </div>
    </Modal>}
  </div>;
}

/* ── TAB: INVOICES ── */
function AdminInvoicesTab({client,upd,show,settings}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({description:'',amount:'',dueDate:'',status:'draft',notes:'',gstEnabled:true,gstRate:'18',discount:0,currency:'INR',recurring:false,recurringPeriod:'Monthly'});
  const invoices=client.invoices||[];
  const save=()=>{
    if(!form.description||!form.amount)return;
    const amt=parseFloat(form.amount);
    const gstRate=form.gstEnabled?parseFloat(form.gstRate)||0:0;
    const discAmt=Math.round(amt*(parseFloat(form.discount)||0)/100);
    const amtAfterDisc=amt-discAmt;
    const gstAmt=Math.round(amtAfterDisc*gstRate/100);
    const inv={...form,id:uid(),amount:amtAfterDisc,discountPercent:parseFloat(form.discount)||0,discountAmount:discAmt,gstRate,gstAmount:gstAmt,totalWithGst:amtAfterDisc+gstAmt,currency:form.currency||'INR',recurring:form.recurring,recurringPeriod:form.recurringPeriod,number:`${settings.invoicePrefix||'INV'}-${String(invoices.length+1).padStart(3,'0')}`,createdAt:new Date().toISOString()};
    upd(c=>addLog({...c,invoices:modal?.id?c.invoices.map(x=>x.id===modal.id?{...inv,id:modal.id,number:x.number}:x):[...(c.invoices||[]),inv]},`Invoice ${modal?.id?'updated':'created'}: ₹${inv.totalWithGst}`));
    setModal(null);setForm({description:'',amount:'',dueDate:'',status:'draft',notes:'',gstEnabled:true,gstRate:'18',discount:0,currency:'INR',recurring:false,recurringPeriod:'Monthly'});show('Invoice saved!');
  };
  const getTotal=inv=>(inv.totalWithGst||inv.amount||0);
  const total=invoices.reduce((a,i)=>a+getTotal(i),0);
  const paid=invoices.filter(i=>i.status==='paid').reduce((a,i)=>a+getTotal(i),0);
  const totalGst=invoices.reduce((a,i)=>a+(i.gstAmount||0),0);
  const due=total-paid;

  return <div className="space-3">
    <div className="grid-4">
      {[['Total',curr(total),'💳'],['Collected',curr(paid),'✅'],['Outstanding',curr(due),'⏳'],['GST',curr(totalGst),'🏛️']].map(([l,v,e])=>
        <div key={l} className="card card-sm" style={{textAlign:'center'}}>
          <div style={{fontSize:20,marginBottom:4}}>{e}</div>
          <div style={{fontSize:12,color:'var(--text3)'}}>{l}</div>
          <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20,marginTop:2}}>{v}</div>
        </div>)}
    </div>
    <div style={{display:'flex',justifyContent:'flex-end'}}>
      <button className="btn btn-primary btn-sm" onClick={()=>{setForm({description:'',amount:'',dueDate:'',status:'draft',notes:'',gstEnabled:true,discount:0,currency:'INR',recurring:false,recurringPeriod:'Monthly',gstRate:String(settings.taxRate||18)});setModal({});}}>
        <Icon n="plus" s={13}/> New Invoice
      </button>
    </div>
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      {invoices.length===0?<div className="empty-state"><div className="empty-icon">📋</div><div className="empty-text">No invoices yet.</div></div>:
        <div className="table-wrap"><table className="table">
          <thead><tr><th>#</th><th>Description</th><th>Amount</th><th>GST</th><th>Total</th><th>Due</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {invoices.map(inv=>{const c=ic(inv.status);return <tr key={inv.id}>
              <td style={{color:'var(--text3)',fontSize:12}}>{inv.number}</td>
              <td style={{fontWeight:500}}>{inv.description}</td>
              <td>{curr(inv.amount)}</td>
              <td style={{color:'var(--text3)',fontSize:12}}>{inv.gstAmount?curr(inv.gstAmount)+' ('+inv.gstRate+'%)':'—'}</td>
              <td style={{fontWeight:700}}>{curr(getTotal(inv))}</td>
              <td style={{color:'var(--text3)'}}>{fmt(inv.dueDate)}</td>
              <td>
                <select value={inv.status} onChange={e=>upd(c=>({...c,invoices:c.invoices.map(x=>x.id===inv.id?{...x,status:e.target.value}:x)}))} className="badge" style={{background:c.bg,color:c.text,border:'none',cursor:'pointer',fontFamily:'var(--font-body)'}}>
                  {['draft','sent','paid','overdue'].map(s=><option key={s}>{s}</option>)}
                </select>
              </td>
              <td>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-ghost btn-icon btn-sm" title="Download PDF" onClick={()=>downloadInvoicePDF(inv,client,settings)}><Icon n="download" s={13}/></button>
                  <button className="btn btn-ghost btn-icon btn-sm" title="Send Email" onClick={()=>sendInvoiceEmail(inv,client,settings)}><Icon n="mail" s={13}/></button>
                  <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>{setForm({description:inv.description,amount:String(inv.amount),dueDate:inv.dueDate||'',status:inv.status,notes:inv.notes||'',gstEnabled:(inv.gstRate||0)>0,gstRate:String(inv.gstRate||18)});setModal(inv);}}><Icon n="edit" s={13}/></button>
                  <button className="btn btn-danger btn-icon btn-sm" onClick={()=>{upd(c=>({...c,invoices:c.invoices.filter(x=>x.id!==inv.id)}));show('Invoice deleted');}}><Icon n="trash" s={13}/></button>
                </div>
              </td>
            </tr>;})}
          </tbody>
        </table></div>}
    </div>
    {modal!==null&&<Modal title={modal?.id?'Edit Invoice':'New Invoice'} onClose={()=>setModal(null)}>
      <div className="space-3">
        <div><label className="form-label">Description *</label><input className="input" placeholder="What is this invoice for?" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div className="grid-2">
          <div><label className="form-label">Amount (₹) *</label><input className="input" type="number" placeholder="5000" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div>
          <div><label className="form-label">Due Date</label><input className="input" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/></div>
        </div>
        <div className="card card-sm" style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:form.gstEnabled?10:0}}>
            <div><div style={{fontWeight:600,fontSize:13}}>Add GST</div><div style={{fontSize:11,color:'var(--text3)'}}>Include Goods & Services Tax in this invoice</div></div>
            <button className={`toggle ${form.gstEnabled?'on':''}`} onClick={()=>setForm(p=>({...p,gstEnabled:!p.gstEnabled}))}/>
          </div>
          {form.gstEnabled&&<div className="grid-3" style={{gap:8}}>
            <div><label className="form-label">GST Rate (%)</label>
              <select className="input" value={form.gstRate} onChange={e=>setForm(p=>({...p,gstRate:e.target.value}))}>
                <option value="5">5%</option><option value="12">12%</option><option value="18">18%</option><option value="28">28%</option>
              </select>
            </div>
            <div><label className="form-label">GST Amount</label><div style={{padding:'9px 12px',background:'rgba(255,255,255,.04)',borderRadius:10,fontSize:13,fontWeight:600,color:'var(--text2)'}}>₹{form.amount?Math.round(parseFloat(form.amount)*(parseFloat(form.gstRate)||0)/100).toLocaleString('en-IN'):'0'}</div></div>
            <div><label className="form-label">Total with GST</label><div style={{padding:'9px 12px',background:'rgba(255,255,255,.04)',borderRadius:10,fontSize:13,fontWeight:700,color:'#e5e7eb'}}>₹{form.amount?Math.round(parseFloat(form.amount)*(1+(parseFloat(form.gstRate)||0)/100)).toLocaleString('en-IN'):'0'}</div></div>
          </div>}
        </div>
        <div><label className="form-label">Status</label>
          <select className="input" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
            {['draft','sent','paid','overdue'].map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div><label className="form-label">Notes</label><textarea className="input" placeholder="Payment instructions, bank details…" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/></div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={save}>Save Invoice</button>
        </div>
      </div>
    </Modal>}
  </div>;
}

/* ── TAB: APPROVALS ── */
function AdminApprovalsTab({client,upd,show}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({title:'',description:'',fileUrl:'',category:'Design'});
  const approvals=client.approvals||[];
  const create=()=>{
    if(!form.title)return;
    const a={...form,id:uid(),status:'pending',createdAt:new Date().toISOString(),comments:[]};
    upd(c=>addLog({...c,approvals:[...(c.approvals||[]),a]},`Approval requested: ${a.title}`));
    setModal(null);setForm({title:'',description:'',fileUrl:'',category:'Design'});show('Approval request sent!');
  };
  const setStatus=(id,status)=>upd(c=>addLog({...c,approvals:c.approvals.map(a=>a.id===id?{...a,status}:a)},`Approval ${status}: ${c.approvals.find(a=>a.id===id)?.title}`));
  const CATS=['Design','Content','Development','Contract','Other'];
  const statusStyle={pending:'approval-pending',approved:'approval-approved',changes_requested:'approval-changes'};

  return <div className="space-3">
    <div style={{display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
      <button className="btn btn-secondary btn-sm" onClick={()=>downloadApprovalSummaryPDF(client)}><Icon n="download" s={13}/> Export PDF</button>
      <button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}><Icon n="plus" s={13}/> Request Approval</button>
    </div>
    {approvals.length===0?<div className="empty-state"><div className="empty-icon">✅</div><div className="empty-text">No approval requests yet.</div></div>:
      approvals.map(a=><div key={a.id} className={`approval-card ${statusStyle[a.status]||''}`}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{a.title}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{a.category} · {fmt(a.createdAt)}</div>
          </div>
          <Badge bg={a.status==='approved'?'rgba(16,185,129,.15)':a.status==='changes_requested'?'rgba(239,68,68,.15)':'rgba(245,158,11,.15)'} text={a.status==='approved'?'#6ee7b7':a.status==='changes_requested'?'#fca5a5':'#fbbf24'}>
            {a.status==='changes_requested'?'Changes Requested':a.status.charAt(0).toUpperCase()+a.status.slice(1)}
          </Badge>
        </div>
        {a.description&&<p style={{fontSize:13,color:'var(--text2)',marginBottom:10,lineHeight:1.5}}>{a.description}</p>}
        {a.fileUrl&&<a href={a.fileUrl} target="_blank" rel="noreferrer" style={{fontSize:12,color:'#d1d5db',display:'flex',alignItems:'center',gap:4,marginBottom:10,textDecoration:'none'}}>
          <Icon n="link" s={12}/> View File
        </a>}
        {a.status==='pending'&&<div style={{display:'flex',gap:8,marginTop:8}}>
          <button className="btn btn-success btn-sm" onClick={()=>setStatus(a.id,'approved')}><Icon n="check" s={13}/> Approve</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setStatus(a.id,'changes_requested')}>Request Changes</button>
        </div>}
      </div>)}
    {modal&&<Modal title="Request Approval" onClose={()=>setModal(null)}>
      <div className="space-3">
        <div><label className="form-label">Title *</label><input className="input" placeholder="What needs approval?" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div>
        <div><label className="form-label">Category</label>
          <select className="input" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
            {CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div><label className="form-label">Description</label><textarea className="input" placeholder="Context for the client…" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
        <div><label className="form-label">File / Preview URL</label><input className="input" placeholder="https://drive.google.com/…" value={form.fileUrl} onChange={e=>setForm(p=>({...p,fileUrl:e.target.value}))}/></div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={create}>Send Request</button>
        </div>
      </div>
    </Modal>}

/* ── TAB: TIME TRACKING (NEW) ── */
function AdminTimeTab({client,upd,show}){
  const [running,setRunning]=useState(false);
  const [start,setStart]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [desc,setDesc]=useState('');
  const [manual,setManual]=useState({date:'',hours:'',desc:''});
  const entries=client.timeEntries||[];
  const total=entries.reduce((a,e)=>a+Number(e.hours||0),0);

  useEffect(()=>{
    if(!running)return;
    const i=setInterval(()=>setElapsed(Date.now()-start),1000);
    return()=>clearInterval(i);
  },[running,start]);

  const startTimer=()=>{setRunning(true);setStart(Date.now());setElapsed(0);};
  const stopTimer=()=>{
    const h=elapsed/3600000;
    const e={id:uid(),hours:Math.round(h*100)/100,desc:desc||'Tracked session',date:new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()};
    upd(c=>({...c,timeEntries:[e,...(c.timeEntries||[])]}));
    setRunning(false);setElapsed(0);setDesc('');show('Time logged!');
  };
  const addManual=()=>{
    if(!manual.hours||!manual.date)return;
    const e={id:uid(),hours:parseFloat(manual.hours),desc:manual.desc||'Manual entry',date:manual.date,createdAt:new Date().toISOString()};
    upd(c=>({...c,timeEntries:[e,...(c.timeEntries||[])]}));
    setManual({date:'',hours:'',desc:''});show('Time entry added!');
  };
  const fmtElapsed=ms=>{const s=Math.floor(ms/1000);return`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;};

  return <div className="space-3">
    <div className="grid-2">
      <div className="card card-sm">
        <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,marginBottom:12}}>Timer</h3>
        <div style={{fontFamily:'var(--font-display)',fontSize:36,fontWeight:800,textAlign:'center',margin:'16px 0',color:running?'#6ee7b7':'var(--text)'}}>{fmtElapsed(elapsed)}</div>
        <input className="input" placeholder="What are you working on?" value={desc} onChange={e=>setDesc(e.target.value)} style={{marginBottom:10}}/>
        {!running?<button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={startTimer}>▶ Start Timer</button>:
          <button className="btn btn-danger" style={{width:'100%',justifyContent:'center'}} onClick={stopTimer}>⬛ Stop & Log</button>}
      </div>
      <div className="card card-sm">
        <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,marginBottom:12}}>Manual Entry</h3>
        <div className="space-2">
          <div><label className="form-label">Date</label><input className="input" type="date" value={manual.date} onChange={e=>setManual(p=>({...p,date:e.target.value}))}/></div>
          <div><label className="form-label">Hours</label><input className="input" type="number" step="0.25" placeholder="2.5" value={manual.hours} onChange={e=>setManual(p=>({...p,hours:e.target.value}))}/></div>
          <div><label className="form-label">Description</label><input className="input" placeholder="What did you work on?" value={manual.desc} onChange={e=>setManual(p=>({...p,desc:e.target.value}))}/></div>
          <button className="btn btn-primary btn-sm" onClick={addManual}><Icon n="plus" s={13}/> Add Entry</button>
        </div>
      </div>
    </div>
    <div className="card card-sm">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14}}>Time Log</h3>
        <span style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:16,color:'#6ee7b7'}}>{total.toFixed(1)} hrs total</span>
      </div>
      {entries.length===0?<div className="empty-state" style={{padding:'30px 0'}}><div className="empty-icon">⏱</div><div className="empty-text">No time entries yet.</div></div>:
        <table className="table">
          <thead><tr><th>Date</th><th>Hours</th><th>Description</th><th></th></tr></thead>
          <tbody>
            {entries.map(e=><tr key={e.id}>
              <td style={{color:'var(--text3)'}}>{fmt(e.date)}</td>
              <td style={{fontWeight:700,color:'#6ee7b7'}}>{e.hours}h</td>
              <td>{e.desc}</td>
              <td><button className="btn btn-danger btn-icon btn-sm" onClick={()=>upd(c=>({...c,timeEntries:c.timeEntries.filter(x=>x.id!==e.id)}))}><Icon n="trash" s={12}/></button></td>
            </tr>)}
          </tbody>
        </table>}
    </div>
  </div>;
}

}

function AdminGoals({settings, updSettings, clients}) {
  const [goals, setGoals] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ut_goals')||'[]'); } catch { return []; }
  });
  const [form, setForm] = useState({title:'',target:'',unit:'',deadline:'',category:'revenue'});
  const [showAdd, setShowAdd] = useState(false);
  const save = gs => { setGoals(gs); try{localStorage.setItem('ut_goals',JSON.stringify(gs));}catch{} };
  const addGoal = () => {
    if(!form.title||!form.target) return;
    save([...goals, {...form, id:uid(), target:Number(form.target), current:0, createdAt:new Date().toISOString()}]);
    setForm({title:'',target:'',unit:'',deadline:'',category:'revenue'}); setShowAdd(false);
  };
  const updateProgress = (id, val) => save(goals.map(g=>g.id===id?{...g,current:Number(val)||0}:g));
  const deleteGoal = id => save(goals.filter(g=>g.id!==id));
  const autoValues = {
    revenue: clients.reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0)+s,0),
    clients: clients.length,
    completed: clients.filter(c=>c.status==='Completed').length,
  };
  const categories = [{v:'revenue',l:'Revenue',auto:true},{v:'clients',l:'Total Clients',auto:true},{v:'completed',l:'Projects Completed',auto:true},{v:'custom',l:'Custom',auto:false}];
  return (
    <div className="space-4 fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:26,background:'linear-gradient(135deg,#f1f5f9,#e5e7eb)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Goals & Targets</h1>
          <p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>Track your business objectives and milestones</p>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Icon n="plus" s={14}/> Add Goal</button>
      </div>
      {goals.length === 0 && !showAdd && <EmptyState icon="🎯" text="No goals yet. Add your first business goal to get started!" action="Add Goal" onAction={()=>setShowAdd(true)}/>}
      {showAdd && (
        <div className="card">
          <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15,marginBottom:16}}>New Goal</h3>
          <div className="grid-2" style={{gap:12}}>
            <div style={{gridColumn:'1/-1'}}><label className="form-label">Goal Title</label><input className="input" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Reach monthly revenue target"/></div>
            <div><label className="form-label">Category</label>
              <select className="input" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                {categories.map(c=><option key={c.v} value={c.v}>{c.l}</option>)}
              </select>
            </div>
            <div><label className="form-label">Target Value</label><input className="input" type="number" value={form.target} onChange={e=>setForm(p=>({...p,target:e.target.value}))} placeholder="1000000"/></div>
            <div><label className="form-label">Unit (optional)</label><input className="input" value={form.unit} onChange={e=>setForm(p=>({...p,unit:e.target.value}))} placeholder="clients, projects..."/></div>
            <div><label className="form-label">Deadline</label><input className="input" type="date" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
            <button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={addGoal}>Save Goal</button>
          </div>
        </div>
      )}
      <div className="space-3">
        {goals.map(g => {
          const isAuto = g.category !== 'custom';
          const current = isAuto ? (autoValues[g.category]||0) : g.current;
          const pct = g.target > 0 ? Math.min(100, Math.round(current/g.target*100)) : 0;
          const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline)-new Date())/(1000*60*60*24)) : null;
          return (
            <div key={g.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:15}}>{g.title}</span>
                    <span style={{fontSize:10,background:'rgba(255,255,255,.12)',color:'#e5e7eb',borderRadius:99,padding:'2px 8px',textTransform:'uppercase',fontWeight:700}}>{g.category}</span>
                    {isAuto && <span style={{fontSize:10,color:'var(--green)',background:'rgba(16,185,129,.1)',borderRadius:99,padding:'2px 7px'}}>Auto-tracked</span>}
                  </div>
                  <div style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>
                    {g.unit||''}{typeof current==='number'?current.toLocaleString('en-IN'):current} / {g.unit||''}{Number(g.target).toLocaleString('en-IN')}
                    {daysLeft !== null && <span style={{marginLeft:12,color:daysLeft<0?'var(--red)':daysLeft<7?'var(--amber)':'var(--text3)',fontSize:12}}>{daysLeft<0?'Overdue':''+daysLeft+' days left'}</span>}
                  </div>
                  <div className="goal-bar"><div className="goal-fill" style={{width:pct+'%'}}/></div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{pct}% complete</div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  {!isAuto && (
                    <input type="number" className="input" style={{width:90}} value={g.current||''} onChange={e=>updateProgress(g.id,e.target.value)} placeholder="Current"/>
                  )}
                  <button className="btn btn-danger btn-icon btn-sm" onClick={()=>deleteGoal(g.id)}><Icon n="trash" s={13}/></button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AdminTimerPage({clients, settings, updClient, show}) {
  const [selClientId, setSelClientId] = useState('');
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [desc, setDesc] = useState('');
  const [logs, setLogs] = useState([]);
  const intervalRef = useRef(null);
  const startRef = useRef(null);
  useEffect(()=>{
    if(running){
      startRef.current = Date.now() - elapsed*1000;
      intervalRef.current = setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return ()=>clearInterval(intervalRef.current);
  },[running]);
  const h=Math.floor(elapsed/3600), m=Math.floor((elapsed%3600)/60), s=elapsed%60;
  const fmt2 = n => String(n).padStart(2,'0');
  const stop = () => {
    setRunning(false);
    if(elapsed < 10) return;
    const hrs = Math.round(elapsed/360)/10;
    const entry = {id:uid(), hours:hrs, date:new Date().toISOString().slice(0,10), description:desc||'Timer session', createdAt:new Date().toISOString()};
    if(selClientId) {
      updClient(selClientId, c=>addLog({...c, timeEntries:[...(c.timeEntries||[]),entry]}, `Time logged: ${hrs}h`));
      show(`Logged ${hrs}h to ${clients.find(c=>c.id===selClientId)?.name||'client'}`);
    }
    setLogs(p=>[{...entry,clientId:selClientId,clientName:clients.find(c=>c.id===selClientId)?.name||'No client'},...p].slice(0,20));
    setElapsed(0); setDesc('');
  };
  const recentEntries = clients.flatMap(c=>(c.timeEntries||[]).map(e=>({...e,clientName:c.name}))).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,10);
  return (
    <div className="space-4 fade-in">
      <div>
        <h1 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:26,background:'linear-gradient(135deg,#f1f5f9,#e5e7eb)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Time Tracker</h1>
        <p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>Log billable hours across all clients</p>
      </div>
      <div className="grid-2">
        <div className="card" style={{textAlign:'center',padding:40}}>
          <div className="timer-display" style={{color:running?'#e5e7eb':'var(--text)',marginBottom:24,transition:'color .3s'}}>
            {fmt2(h)}:{fmt2(m)}:{fmt2(s)}
          </div>
          <div className="space-3" style={{maxWidth:320,margin:'0 auto'}}>
            <select className="input" value={selClientId} onChange={e=>setSelClientId(e.target.value)}>
              <option value="">— Select Client (optional) —</option>
              {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <input className="input" placeholder="Description (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              {!running
                ? <button className="btn btn-primary btn-lg" onClick={()=>setRunning(true)} style={{minWidth:120}}><Icon n="clock" s={16}/> Start</button>
                : <>
                    <button className="btn btn-danger btn-lg" onClick={stop} style={{minWidth:120}}>Stop &amp; Save</button>
                    <button className="btn btn-secondary btn-lg" onClick={()=>{setRunning(false);setElapsed(0);}}>Reset</button>
                  </>
              }
            </div>
            {running && <div className="animate-pulse" style={{fontSize:12,color:'var(--accent)',textAlign:'center'}}>● Recording…</div>}
          </div>
        </div>
        <div className="card">
          <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15,marginBottom:16}}>Recent Time Logs</h3>
          {recentEntries.length===0 ? <EmptyState icon="⏱" text="No time logs yet."/> :
            <div className="space-2">
              {recentEntries.map((e,i)=>(
                <div key={e.id||i} style={{padding:'8px 10px',border:'1px solid var(--border)',borderRadius:10,display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{e.clientName}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{e.description||'Session'} · {fmt(e.date)}</div>
                  </div>
                  <span style={{background:'rgba(255,255,255,.12)',color:'#e5e7eb',borderRadius:99,padding:'3px 10px',fontSize:12,fontWeight:700,height:'fit-content'}}>{Number(e.hours||0).toFixed(1)}h</span>
                </div>
              ))}
            </div>
          }
          <div style={{marginTop:16,padding:'12px 14px',background:'rgba(255,255,255,.08)',borderRadius:10}}>
            <div style={{fontSize:11,color:'var(--text3)'}}>Total logged this month</div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20,marginTop:2}}>
              {clients.reduce((s,c)=>{
                const thisMonth = new Date().getMonth();
                return s+(c.timeEntries||[]).filter(e=>new Date(e.date||e.createdAt||0).getMonth()===thisMonth).reduce((a,e)=>a+Number(e.hours||0),0);
              },0).toFixed(1)}h
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function AdminLeaderboard({clients, settings}) {

              </div>
              <div style={{fontSize:10,color:'var(--text3)'}}>

function AdminBudgetOverview({clients, settings}) {
  const data = clients.map(c => {
    const budget = Number(c.budget||0);
    const spent = (c.expenses||[]).reduce((a,e)=>a+Number(e.amount||0),0);
    const invoiced = (c.invoices||[]).reduce((a,i)=>a+getInvoiceTotal(i),0);
    const collected = (c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0);
    const utilization = budget>0 ? Math.round(spent/budget*100) : 0;
    return {...c, budget, spent, invoiced, collected, utilization};
  }).filter(c=>c.budget>0||c.invoiced>0).sort((a,b)=>b.budget-a.budget);
  const totalBudget = data.reduce((s,c)=>s+c.budget,0);
  const totalSpent = data.reduce((s,c)=>s+c.spent,0);

        <p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>Track budgets, expenses and collections across all clients</p>
      </div>
      <div className="grid-3">
        {[['Total Budget',curr(totalBudget),'💼','rgba(255,255,255,.12)','#e5e7eb'],['Total Expenses',curr(totalSpent),'💸','rgba(239,68,68,.15)','#fca5a5'],['Total Collected',curr(totalCollected),'✅','rgba(16,185,129,.15)','#6ee7b7']].map(([l,v,e,bg,clr])=>(
          <div key={l} className="card" style={{background:bg,border:`1px solid ${clr}20`}}>
            <div style={{fontSize:28,marginBottom:8}}>{e}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>{l}</div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22,color:clr,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',background:'rgba(255,255,255,.015)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:16,fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.04em'}}>
            <span>Client</span><span>Budget</span><span>Spent</span><span>Collected</span>
          </div>
        </div>
        {data.length===0 && <div className="empty-state"><div className="empty-icon">💼</div><div className="empty-text">No budget data. Add budgets in client forms.</div></div>}
        {data.map(c=>(
          <div key={c.id} style={{padding:'14px 20px',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:16,alignItems:'center'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                <div style={{marginTop:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:11,color:'var(--text3)'}}>Budget utilization</span>
                    <span style={{fontSize:11,color:c.utilization>90?'var(--red)':c.utilization>70?'var(--amber)':'var(--green)'}}>{c.utilization}%</span>
                  </div>

                </div>
              </div>
              <span style={{fontWeight:700,fontSize:13}}>{c.budget>0?curr(c.budget):'—'}</span>
              <span style={{fontWeight:700,fontSize:13,color:'var(--red)'}}>{c.spent>0?curr(c.spent):'—'}</span>

        ))}

  );

function AdminBulkMessage({clients, updClient, show}) {
  const [selectedIds, setSelectedIds] = useState([]);
  const [msg, setMsg] = useState('');
  const [title, setTitle] = useState('');
  const [type, setType] = useState('announcement');
  const [sent, setSent] = useState(false);
  const toggle = id => setSelectedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const selectAll = () => setSelectedIds(clients.map(c=>c.id));
  const send = () => {
    if(!msg.trim()||selectedIds.length===0) return;
    selectedIds.forEach(id=>{
      if(type==='announcement') {
        updClient(id, c=>addLog({...c,announcements:[{id:uid(),title:title||'Announcement',message:msg,type:'update',createdAt:new Date().toISOString()},...(c.announcements||[])]},`Bulk announcement sent`));
      } else {
        updClient(id, c=>addLog({...c,messages:[...(c.messages||[]),{id:uid(),sender:'admin',text:msg,ts:new Date().toISOString(),attachments:[]}]},'Bulk message sent'));
      }
    });
    show(`Sent to ${selectedIds.length} client${selectedIds.length>1?'s':''}`);
    setMsg(''); setTitle(''); setSelectedIds([]); setSent(true);
    setTimeout(()=>setSent(false),3000);
  };
  return (
    <div className="space-4 fade-in">

function AdminGanttTab({client}) {
  const milestones = client.milestones||[];
  const tasks = (client.tasks||[]).filter(t=>t.dueDate);
  const startDate = new Date(client.startDate||client.createdAt||Date.now());
  const endDate = new Date(client.dueDate||Date.now()+90*24*60*60*1000);
  const totalDays = Math.max(1,(endDate-startDate)/(1000*60*60*24));
  const getPos = d => Math.min(100,Math.max(0,(new Date(d)-startDate)/(endDate-startDate)*100));
  const today = getPos(new Date());
  if(milestones.length===0&&tasks.length===0) return <EmptyState icon="📅" text="No milestones or dated tasks yet. Add milestones and set task due dates to see the Gantt chart."/>;
  return (
    <div className="space-3">
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginBottom:4,padding:'0 4px'}}>
        <span>{fmt(startDate)}</span><span>Today</span><span>{fmt(endDate)}</span>
      </div>
      <div style={{position:'relative',marginBottom:8}}>
        <div style={{height:2,background:'rgba(255,255,255,.06)',borderRadius:99,position:'relative'}}>
          <div style={{position:'absolute',left:today+'%',top:-4,width:2,height:10,background:'var(--accent)',borderRadius:99}}/>
        </div>
      </div>
      {milestones.length > 0 && (
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Milestones</div>

            const pos = m.date ? getPos(m.date) : 50;
            const done = m.status==='completed';
            return (
              <div key={m.id||i} className="gantt-row">
                <div style={{width:160,flexShrink:0,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.title}</div>
                <div style={{flex:1,position:'relative',height:24,background:'rgba(255,255,255,.03)',borderRadius:4}}>
                  <div style={{position:'absolute',left:Math.max(0,pos-1)+'%',top:'50%',transform:'translateY(-50%)',width:12,height:12,borderRadius:'50%',background:done?'var(--green)':'var(--accent)',boxShadow:`0 0 8px ${done?'var(--green)':'var(--accent)'}`,border:'2px solid var(--bg2)'}}/>
                </div>
                <span style={{fontSize:11,color:done?'var(--green)':'var(--text3)',flexShrink:0,width:60,textAlign:'right'}}>{done?'Done':m.date?fmt(m.date):'—'}</span>
              </div>
            );
          })}
        </div>

        <div style={{marginTop:16}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Tasks</div>
          {tasks.slice(0,20).map((t,i)=>{
            const pos = getPos(t.dueDate);
            const done = t.status==='completed';
            const overdue = !done&&isOverdue(t.dueDate);
            return (
              <div key={t.id||i} className="gantt-row">
                <div style={{width:160,flexShrink:0,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:done?'var(--text3)':'var(--text)'}}>{t.title}</div>
                <div style={{flex:1,position:'relative',height:20,background:'rgba(255,255,255,.03)',borderRadius:4}}>
                  <div className="gantt-bar" style={{position:'absolute',left:'0%',width:pos+'%',background:done?'var(--green)':overdue?'var(--red)':'linear-gradient(90deg,var(--accent),var(--accent2))',opacity:done?.6:1}}/>

function AdminCalendar({clients}){
  const [month,setMonth]=useState(new Date().getMonth());
  const [year,setYear]=useState(new Date().getFullYear());
  const events=useMemo(()=>{const ev=[];clients.forEach(c=>{
    if(c.dueDate)ev.push({date:c.dueDate,label:'📅 '+c.name+' - Due',color:'var(--red)'});
    if(c.startDate)ev.push({date:c.startDate,label:'🚀 '+c.name+' - Start',color:'var(--green)'});
    (c.tasks||[]).forEach(t=>{if(t.dueDate)ev.push({date:t.dueDate,label:'✅ '+t.title,color:'var(--blue)'});});
    (c.invoices||[]).forEach(i=>{if(i.dueDate)ev.push({date:i.dueDate,label:'💰 '+i.description+' - '+curr(getInvoiceTotal(i)),color:'var(--amber)'});});
    (c.meetings||[]).forEach(m=>{if(m.date)ev.push({date:m.date,label:'🤝 '+m.title,color:'var(--accent)'});});
  });return ev;},[clients]);
  const daysInMonth=new Date(year,month+1,0).getDate();const firstDay=new Date(year,month,1).getDay();
  const days=Array.from({length:daysInMonth},(_,i)=>i+1);const blanks=Array.from({length:firstDay},(_,i)=>i);
  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};
  const today=new Date();const isToday=d=>d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
  return <div className="space-4 fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>Calendar</h2>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button className="btn btn-ghost btn-icon" onClick={prev}><Icon n="chevLeft" s={16}/></button>
        <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,minWidth:140,textAlign:'center'}}>{new Date(year,month).toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</span>
        <button className="btn btn-ghost btn-icon" onClick={next}><Icon n="chevRight" s={16}/></button>
      </div>
    </div>
    <div className="card" style={{padding:12}}>
      <div className="cal-grid" style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text3)',padding:8}}>{d}</div>)}
        {blanks.map(i=><div key={'b'+i}/>)}
        {days.map(d=>{const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const dayEv=events.filter(e=>e.date===dateStr);
          return <div key={d} style={{minHeight:80,padding:4,borderRadius:8,border:isToday(d)?'1px solid var(--accent)':'1px solid transparent',background:isToday(d)?'rgba(255,255,255,.08)':'transparent'}}>
            <div style={{fontSize:12,fontWeight:isToday(d)?700:400,color:isToday(d)?'#e5e7eb':'var(--text2)',marginBottom:2,textAlign:'center'}}>{d}</div>
            {dayEv.slice(0,3).map((ev,i)=><div key={i} style={{fontSize:9,color:ev.color,padding:'1px 4px',borderRadius:4,background:ev.color+'15',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.label}</div>)}
            {dayEv.length>3&&<div style={{fontSize:9,color:'var(--text3)',textAlign:'center'}}>+{dayEv.length-3} more</div>}
          </div>;})}
      </div>
    </div>
  </div>;
}

/* ═══ ADMIN REPORTS ═══ */
function AdminReports({clients,settings}){

    <div className="grid-3" style={{gap:12}}>
      {[
        {title:'Client Summary',desc:'All clients with status, progress & revenue as PDF.',icon:'users',action:()=>{
          const totalRev=clients.reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0)+s,0);
          downloadReportPDF('Client Summary Report','All clients overview',
            ['Name','Company','Email','Status','Progress','Revenue'],
            clients.map(c=>[c.name||'',c.company||'',c.email||'',c.status||'Pending',(c.progress||0)+'%','₹'+((c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0)).toLocaleString('en-IN')]),
            [{label:'Total Clients',value:clients.length},{label:'Active',value:clients.filter(c=>c.status==='In Progress').length},{label:'Total Revenue',value:'₹'+totalRev.toLocaleString('en-IN')}]
          );
        }},
        {title:'Invoice Report',desc:'All invoices across clients as PDF.',icon:'invoice',action:()=>{
          const allInv=clients.flatMap(c=>(c.invoices||[]).map(i=>({...i,clientName:c.name})));
          const totalAmt=allInv.reduce((a,i)=>a+getInvoiceTotal(i),0);const paidAmt=allInv.reduce((a,i)=>a+getInvoicePaidAmount(i),0);
          downloadReportPDF('Invoice Report','All invoices across clients',
            ['Client','Invoice #','Description','Amount','Status','Due Date'],
            allInv.map(i=>[i.clientName,i.number||'—',i.description,'₹'+getInvoiceTotal(i).toLocaleString('en-IN'),i.status||'draft',i.dueDate?new Date(i.dueDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—']),
            [{label:'Total Invoiced',value:'₹'+totalAmt.toLocaleString('en-IN')},{label:'Collected',value:'₹'+paidAmt.toLocaleString('en-IN')},{label:'Outstanding',value:'₹'+(totalAmt-paidAmt).toLocaleString('en-IN')}]
          );
        }},
        {title:'Time Tracking',desc:'Hours logged per client as PDF.',icon:'clock',action:()=>{
          const totalH=clients.reduce((s,c)=>(c.timeEntries||[]).reduce((a,e)=>a+Number(e.hours||0),0)+s,0);
          downloadReportPDF('Time Tracking Report','Hours logged per client',
            ['Client','Total Hours','Entries','Est. Cost'],
            clients.filter(c=>(c.timeEntries||[]).length>0).map(c=>{const h=(c.timeEntries||[]).reduce((a,e)=>a+Number(e.hours||0),0);return[c.name,h.toFixed(1)+'h',(c.timeEntries||[]).length,'₹'+Math.round(h*(settings.hourlyRate||2000)).toLocaleString('en-IN')];}),
            [{label:'Total Hours',value:totalH.toFixed(1)+'h'},{label:'Total Entries',value:clients.reduce((s,c)=>(c.timeEntries||[]).length+s,0)},{label:'Est. Value',value:'₹'+Math.round(totalH*(settings.hourlyRate||2000)).toLocaleString('en-IN')}]
          );
        }},
        {title:'Task Report',desc:'All tasks with status breakdown as PDF.',icon:'project',action:()=>{
          const allT=clients.flatMap(c=>(c.tasks||[]).map(t=>({...t,clientName:c.name})));
          const done=allT.filter(t=>t.status==='completed').length;
          downloadReportPDF('Task Report','All tasks across clients',
            ['Client','Task','Status','Priority','Due Date'],
            allT.map(t=>[t.clientName,t.title,t.status||'todo',t.priority||'medium',t.dueDate?new Date(t.dueDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—']),
            [{label:'Total Tasks',value:allT.length},{label:'Completed',value:done},{label:'Completion',value:allT.length?Math.round(done/allT.length*100)+'%':'0%'}]
          );
        }},
        {title:'Full Backup (JSON)',desc:'Export everything for backup.',icon:'download',action:()=>downloadJSON({settings,clients,exportedAt:new Date().toISOString()},'clientos-full-backup.json')},
        {title:'Revenue by Client',desc:'Revenue breakdown per client as PDF.',icon:'chart',action:()=>{
          const totalRev=clients.reduce((s,c)=>(c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0)+s,0);
          downloadReportPDF('Revenue Report','Revenue breakdown by client',
            ['Client','Total Invoiced','Paid','Outstanding'],
            clients.filter(c=>(c.invoices||[]).length>0).map(c=>{const t=(c.invoices||[]).reduce((a,i)=>a+getInvoiceTotal(i),0);const p=(c.invoices||[]).reduce((a,i)=>a+getInvoicePaidAmount(i),0);return[c.name,'₹'+t.toLocaleString('en-IN'),'₹'+p.toLocaleString('en-IN'),'₹'+(t-p).toLocaleString('en-IN')];}),
            [{label:'Total Revenue',value:'₹'+totalRev.toLocaleString('en-IN')},{label:'Clients',value:clients.filter(c=>(c.invoices||[]).length>0).length}]
          );
        }},
        {title:'Outstanding Payments',desc:'Pending balances and due dates as PDF.',icon:'invoice',action:()=>downloadOutstandingPaymentsPDF(clients)},
        {title:'Tax Summary',desc:'GST/tax totals across invoices as PDF.',icon:'chart',action:()=>downloadTaxSummaryPDF(clients)},
        {title:'Profitability',desc:'Collected revenue, expenses, labor and profit as PDF.',icon:'trending',action:()=>downloadProfitabilityPDF(clients,settings)},
      ].map(r=><div key={r.title} className="card card-hover" style={{cursor:'pointer'}} onClick={r.action}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
          <div style={{width:40,height:40,borderRadius:10,background:'rgba(255,255,255,.10)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon n={r.icon} s={18} c="#e5e7eb"/></div>
          <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15}}>{r.title}</h3>
        </div>
        <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.5}}>{r.desc}</p>
        <div style={{marginTop:12,fontSize:12,color:'#e5e7eb',fontWeight:600}}>Download Report →</div>
      </div>)}
    </div>
  </div>;
}

  };

    upd(c=>addLog({...c,invoices:c.invoices.map(x=>x.id===inv.id?{...x,reminders:[...(x.reminders||[]),reminder]}:x)},`Invoice reminder sent: ${inv.number}`));

          </div>

            <Badge bg={c.bg} text={c.text}>{inv.status}</Badge>
            <button className="btn btn-secondary btn-sm" onClick={()=>downloadInvoicePDF(inv,client,settings)}><Icon n="download" s={12}/> PDF</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>sendInvoiceEmail(inv,client,settings)}><Icon n="mail" s={12}/> Email</button>
                    <CopyBtn text={`${window.location.origin}${window.location.pathname}?client=${client.id}&tab=invoices`} label="Copy Link"/>
                    <WhatsAppBtn phone={client.phone} message={`Dear ${client.name||'Client'}, your invoice ${inv.number||''} of ₹${pdfCurr(getInvoiceTotal(inv))} is ready. Status: ${inv.status||'draft'}. Please login to your portal to view and pay. - Crixy Ai`} label="WA" size="xs"/>
            <button className="btn btn-info btn-sm" onClick={()=>{setPaymentModal(inv);setPaymentForm({amount:String(getInvoiceBalance(inv)||''),date:new Date().toISOString().slice(0,10),method:'Bank Transfer',notes:'',receiptUrl:inv.receiptUrl||''});}}><Icon n="dollar" s={12}/> Payment</button>
            <button className="btn btn-warning btn-sm" onClick={()=>sendReminder(inv)}><Icon n="bell" s={12}/> Remind</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setForm({description:inv.description,amount:String(inv.amount),dueDate:inv.dueDate||'',status:inv.status,notes:inv.notes||'',gstRate:String(inv.gstRate||'18'),gstEnabled:true,receiptUrl:inv.receiptUrl||''});setModal(inv);}}><Icon n="edit" s={12}/> Edit</button>
          </div>
        </div>
        {(inv.payments||[]).length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:10}}>
          {(inv.payments||[]).slice().reverse().map(p=><button key={p.id} className="btn btn-secondary btn-sm" onClick={()=>downloadReceiptPDF(inv,p,client)}><Icon n="download" s={12}/> Receipt {fmt(p.date||p.createdAt)}</button>)}
        </div>}
      </div>;})}
    {modal!==null&&<Modal title={modal?.id?'Edit Invoice':'New Invoice'} onClose={()=>setModal(null)}><div className="space-3"><input className="input" placeholder="Description" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/><div className="grid-2"><input className="input" type="number" placeholder="Amount" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/><input className="input" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/></div><div className="grid-2"><select className="input" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>{['draft','sent','partial','paid','overdue'].map(s=><option key={s}>{s}</option>)}</select><input className="input" placeholder="Receipt URL" value={form.receiptUrl||''} onChange={e=>setForm(p=>({...p,receiptUrl:e.target.value}))}/></div><div className="grid-2"><label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--text2)'}}><input type="checkbox" checked={form.gstEnabled} onChange={e=>setForm(p=>({...p,gstEnabled:e.target.checked}))}/> Include GST</label><select className="input" value={form.gstRate} onChange={e=>setForm(p=>({...p,gstRate:e.target.value}))} disabled={!form.gstEnabled}><option value="0">0% (No GST)</option><option value="5">5%</option><option value="12">12%</option><option value="18">18%</option><option value="28">28%</option></select></div>{form.gstEnabled&&Number(form.gstRate)>0&&<div style={{background:'rgba(255,255,255,.08)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--text2)'}}><span style={{fontWeight:600}}>GST ({form.gstRate}%): </span>{curr(Math.round((parseFloat(form.amount)||0)*parseFloat(form.gstRate||0)/100))}&nbsp;&nbsp;<span style={{fontWeight:600}}>Total: </span>{curr((parseFloat(form.amount)||0)+Math.round((parseFloat(form.amount)||0)*parseFloat(form.gstRate||0)/100))}</div>}<textarea className="input" rows="3" placeholder="Notes" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/><div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Invoice</button></div></div></Modal>}
    {paymentModal&&<Modal title={`Record Payment · ${paymentModal.number}`} onClose={()=>setPaymentModal(null)}><div className="space-3"><div className="grid-2"><input className="input" type="number" placeholder="Amount" value={paymentForm.amount} onChange={e=>setPaymentForm(p=>({...p,amount:e.target.value}))}/><input className="input" type="date" value={paymentForm.date} onChange={e=>setPaymentForm(p=>({...p,date:e.target.value}))}/></div><div className="grid-2"><select className="input" value={paymentForm.method} onChange={e=>setPaymentForm(p=>({...p,method:e.target.value}))}>{['Bank Transfer','UPI','Cash','Card','Cheque'].map(m=><option key={m}>{m}</option>)}</select><input className="input" placeholder="Receipt URL" value={paymentForm.receiptUrl} onChange={e=>setPaymentForm(p=>({...p,receiptUrl:e.target.value}))}/></div><textarea className="input" rows="3" placeholder="Notes" value={paymentForm.notes} onChange={e=>setPaymentForm(p=>({...p,notes:e.target.value}))}/><div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn btn-secondary" onClick={()=>setPaymentModal(null)}>Cancel</button><button className="btn btn-primary" onClick={addPayment}>Save Payment</button></div></div></Modal>}
  </div>;
}

    if(!staffForm.name.trim())return;
    const next=[...staff,{id:uid(),name:staffForm.name.trim(),role:staffForm.role||'Coordinator',email:staffForm.email.trim(),status:'active',createdAt:new Date().toISOString()}];

function QRCodeWidget({url,size=160}){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current||!window.QRCode)return;
    ref.current.innerHTML='';
    new window.QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#0f172a',colorLight:'#ffffff',correctLevel:window.QRCode.CorrectLevel.M});

function GlobalSearchModal({clients,settings,onNavigate,onClose}){
  const [q,setQ]=React.useState('');
  const [sel,setSel]=React.useState(0);
  const inp=React.useRef(null);
  React.useEffect(()=>{inp.current?.focus();},[]);
  React.useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowDown')setSel(s=>s+1);if(e.key==='ArrowUp')setSel(s=>Math.max(0,s-1));if(e.key==='Enter'&&results[sel])go(results[sel]);};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  });
  const lq=q.toLowerCase().trim();
  const results=React.useMemo(()=>{
    if(!lq)return[];
    const r=[];
    clients.forEach(cl=>{
      if(cl.name?.toLowerCase().includes(lq)||cl.email?.toLowerCase().includes(lq)||cl.company?.toLowerCase().includes(lq))
        r.push({type:'client',icon:'👤',label:cl.name||cl.company,sub:cl.email||cl.status,id:cl.id,action:'client'});
      (cl.invoices||[]).forEach(inv=>{
        if((inv.number||'').toLowerCase().includes(lq)||(inv.description||'').toLowerCase().includes(lq))
          r.push({type:'invoice',icon:'🧾',label:(inv.number||'INV')+' — '+inv.description,sub:'Client: '+(cl.name||''),id:cl.id,action:'client',tab:'invoices'});
      });
      (cl.tasks||[]).forEach(t=>{
        if((t.title||'').toLowerCase().includes(lq))
          r.push({type:'task',icon:'✅',label:t.title,sub:`[${t.status||'todo'}] ${cl.name||''}`,id:cl.id,action:'client',tab:'tasks'});
      });
      (cl.messages||[]).forEach(m=>{
        if((m.text||m.content||'').toLowerCase().includes(lq))
          r.push({type:'message',icon:'💬',label:(m.text||m.content||'').slice(0,60),sub:'Message · '+( cl.name||''),id:cl.id,action:'client',tab:'messages'});
      });
      (cl.proposals||[]).forEach(p=>{
        if((p.title||'').toLowerCase().includes(lq))
          r.push({type:'proposal',icon:'📋',label:p.title,sub:'Proposal · '+(cl.name||''),id:cl.id,action:'client',tab:'proposals'});
      });
    });
    (settings.catalog||[]).forEach(s=>{
      if((s.name||'').toLowerCase().includes(lq))
        r.push({type:'service',icon:'📦',label:s.name,sub:'Service · ₹'+pdfCurr(s.price),action:'catalog'});
    });
    return r.slice(0,20);
  },[lq,clients,settings]);
  const go=item=>{if(item.action==='client'){onNavigate(item.id,item.tab);}else if(item.action==='catalog'){onNavigate(null,'catalog');}onClose();};
  const grouped={client:[],invoice:[],task:[],message:[],proposal:[],service:[]};
  results.forEach(r=>grouped[r.type]?.push(r));
  const groupLabels={client:'Clients',invoice:'Invoices',task:'Tasks',message:'Messages',proposal:'Proposals',service:'Services'};
  let idx=0;
  return <div className="search-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="search-box">
      <div className="search-input-wrap">
        <span style={{fontSize:18,color:'var(--text3)'}}>🔍</span>
        <input ref={inp} className="search-input" placeholder="Search clients, invoices, tasks, messages..." value={q} onChange={e=>{setQ(e.target.value);setSel(0);}}/>
        <span style={{fontSize:11,color:'var(--text4)',whiteSpace:'nowrap'}}>ESC to close</span>
      </div>
      <div className="search-results">
        {!lq&&<div className="search-empty">Start typing to search across all your data...</div>}
        {lq&&results.length===0&&<div className="search-empty">No results found for "{q}"</div>}
        {Object.entries(grouped).map(([type,items])=>{
          if(!items.length)return null;
          return <div key={type}><div className="search-group-label">{groupLabels[type]}</div>
            {items.map(item=>{const i=idx++;return <div key={i} className={`search-item${sel===i?' active':''}`} onClick={()=>go(item)} onMouseEnter={()=>setSel(i)}>
              <div className="search-item-icon">{item.icon}</div>
              <div><div className="search-item-text">{item.label}</div><div className="search-item-sub">{item.sub}</div></div>
            </div>;})}
          </div>;
        })}
      </div>
      <div className="search-footer">
        <span>↑↓ navigate</span><span>Enter select</span><span>Esc close</span>
        <span style={{marginLeft:'auto'}}>{results.length} result{results.length!==1?'s':''}</span>
      </div>
    </div>
  </div>;
}

/* ════════════════════════════════════════════
   ADMIN SEARCH PAGE
════════════════════════════════════════════ */
function AdminSearch({clients,settings,onNavigate}){
  const [q,setQ]=React.useState('');
  const [filter,setFilter]=React.useState('all');
  const lq=q.toLowerCase().trim();
  const results=React.useMemo(()=>{
    if(!lq)return[];
    const r=[];
    clients.forEach(cl=>{
      if((filter==='all'||filter==='clients')&&(cl.name?.toLowerCase().includes(lq)||cl.email?.toLowerCase().includes(lq)||cl.company?.toLowerCase().includes(lq)||(cl.phone||'').includes(lq)))
        r.push({type:'Client',icon:'👤',label:cl.name||cl.company,sub:cl.email+' · '+cl.status,id:cl.id,tab:null});
      if(filter==='all'||filter==='invoices')(cl.invoices||[]).forEach(inv=>{
        if((inv.number||'').toLowerCase().includes(lq)||(inv.description||'').toLowerCase().includes(lq))
          r.push({type:'Invoice',icon:'🧾',label:(inv.number||'INV')+' — '+inv.description,sub:curr(getInvoiceTotal(inv))+' · '+(cl.name||''),id:cl.id,tab:'invoices'});
      });
      if(filter==='all'||filter==='tasks')(cl.tasks||[]).forEach(t=>{
        if((t.title||'').toLowerCase().includes(lq))
          r.push({type:'Task',icon:'✅',label:t.title,sub:`${t.status} · ${cl.name||''}`,id:cl.id,tab:'tasks'});
      });
      if(filter==='all'||filter==='messages')(cl.messages||[]).forEach(m=>{
        if((m.text||m.content||'').toLowerCase().includes(lq))
          r.push({type:'Message',icon:'💬',label:(m.text||m.content||'').slice(0,80),sub:cl.name||'',id:cl.id,tab:'messages'});
      });
    });
    return r.slice(0,60);
  },[lq,clients,filter]);
  return <div className="space-4 fade-in">
    <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>🔍 Global Search</h2>
    <div className="card">
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
        <input className="input" style={{flex:1,minWidth:260}} placeholder="Search across clients, invoices, tasks, messages..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
        <select className="input" style={{width:140}} value={filter} onChange={e=>setFilter(e.target.value)}>
          {['all','clients','invoices','tasks','messages'].map(f=><option key={f} value={f}>{f.charAt(0).toUpperCase()+f.slice(1)}</option>)}
        </select>
      </div>
      {!lq&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)',fontSize:14}}>🔎 Type to search across all your data</div>}
      {lq&&results.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)',fontSize:14}}>No results found for "{q}"</div>}
      {results.length>0&&<div className="space-2">
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>{results.length} result{results.length!==1?'s':''} found</div>
        {results.map((r,i)=><div key={i} className="card card-sm" style={{cursor:'pointer',transition:'all .15s'}} onClick={()=>onNavigate(r.id,r.tab)}
          onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(255,255,255,.32)'} onMouseLeave={e=>e.currentTarget.style.borderColor=''}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:22}}>{r.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{r.label}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{r.sub}</div>
            </div>
            <span style={{fontSize:10,background:'rgba(255,255,255,.12)',color:'#d1d5db',padding:'2px 8px',borderRadius:999,fontWeight:700}}>{r.type}</span>
          </div>
        </div>)}
      </div>}
    </div>
  </div>;
}

          <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={()=>setAddModal(svc)}>+ Add to Invoice</button>

        <button className="btn btn-ghost" onClick={()=>setAddModal(null)}>Cancel</button>
      </div>
    </Modal>}
  </div>;
}

/* ════════════════════════════════════════════

function AdminTeamComm({clients,updClient,show,settings,updSettings}){
  const [form,setForm]=React.useState({text:'',pin:false,tag:'General'});
  const [filter,setFilter]=React.useState('all');
  const notes=settings.teamNotes||[];
  const TAGS=['General','Urgent','Client Note','Reminder','FYI'];
  const addNote=()=>{
    if(!form.text.trim())return;
    const note={id:uid(),text:form.text,tag:form.tag,pin:form.pin,author:'Admin',createdAt:new Date().toISOString()};
    updSettings(p=>({...p,teamNotes:[...(p.teamNotes||[]),note]}));
    setForm({text:'',pin:false,tag:'General'});show('Note posted!');
  };
  const delNote=id=>updSettings(p=>({...p,teamNotes:(p.teamNotes||[]).filter(n=>n.id!==id)}));
  const togglePin=id=>updSettings(p=>({...p,teamNotes:(p.teamNotes||[]).map(n=>n.id===id?{...n,pin:!n.pin}:n)}));
  const filtered=filter==='all'?notes:notes.filter(n=>n.tag===filter);
  const pinned=filtered.filter(n=>n.pin);

    <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>👥 Team Board</h2>

        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select className="input" style={{width:140}} value={form.tag} onChange={e=>setForm(p=>({...p,tag:e.target.value}))}>
            {TAGS.map(t=><option key={t}>{t}</option>)}
          </select>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--text2)',cursor:'pointer'}}>
            <input type="checkbox" checked={form.pin} onChange={e=>setForm(p=>({...p,pin:e.target.checked}))}/> 📌 Pin

          <button className="btn btn-primary btn-sm" onClick={addNote}>Post Note</button>
        </div>
      </div>
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      {['all',...TAGS].map(t=><button key={t} className={`btn btn-sm ${filter===t?'btn-primary':'btn-secondary'}`} onClick={()=>setFilter(t)}>{t}</button>)}
    </div>
    {pinned.length>0&&<div>
      <div style={{fontSize:11,fontWeight:800,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>📌 Pinned</div>
      <div className="space-2">{pinned.map(n=><TeamNoteCard key={n.id} note={n} onDel={delNote} onPin={togglePin}/>)}</div>
    </div>}
    <div>
      {regular.length===0&&notes.length===0?<EmptyState icon="👥" text="No team notes yet. Post the first one!"/>:
        <div className="space-2">{regular.map(n=><TeamNoteCard key={n.id} note={n} onDel={delNote} onPin={togglePin}/>)}</div>}
    </div>
  </div>;
}

function AdminQuotations({settings,updSettings,show}){
  const blankItem=()=>({id:uid(),title:'',description:'',qty:1,rate:''});
  const blankQuote=()=>({clientName:'',email:'',companyName:'',phone:'',title:'',summary:'',amount:'',validUntil:'',status:'draft',notes:'',items:[blankItem()]});
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(blankQuote());
  const quotes=ensureArr(settings.quotations).slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setItem=(id,k,v)=>setForm(p=>({...p,items:p.items.map(item=>item.id===id?{...item,[k]:v}:item)}));
  const addItem=()=>setForm(p=>({...p,items:[...p.items,blankItem()]}));
  const removeItem=id=>setForm(p=>({...p,items:p.items.length>1?p.items.filter(item=>item.id!==id):p.items}));
  const save=()=>{
    if(!form.clientName||!form.email||!form.title){alert('Client name, email, and quotation title are required.');return;}
    const cleanItems=ensureArr(form.items).filter(item=>item.title||item.description||item.rate).map(item=>({...item,qty:Number(item.qty||1),rate:Number(item.rate||0)}));
    const total=cleanItems.length?cleanItems.reduce((a,item)=>a+(Number(item.qty||1)*Number(item.rate||0)),0):Number(form.amount||0);
    if(total<=0){alert('Add at least one service amount or a total quotation amount.');return;}
    const existing=modal?.id;
    const quote={...form,items:cleanItems,id:existing||uid(),amount:total,number:modal?.number||`${settings.quotationPrefix||'QTN'}-${String(ensureArr(settings.quotations).length+1).padStart(3,'0')}`,createdAt:modal?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
    updSettings(prev=>({...prev,quotations:existing?ensureArr(prev.quotations).map(q=>q.id===existing?quote:q):[quote,...ensureArr(prev.quotations)]}));
    setModal(null);setForm(blankQuote());show('Quotation saved!');
  };
  const edit=quote=>{setModal(quote);setForm({...blankQuote(),...quote,items:ensureArr(quote.items).length?quote.items:[blankItem()]});};
  const del=id=>{
    if(!confirm('Delete this quotation?'))return;
    updSettings(prev=>({...prev,quotations:ensureArr(prev.quotations).filter(q=>q.id!==id)}));
    show('Quotation deleted');
  };
  const duplicate=quote=>{
    const next={...quote,id:uid(),number:`${settings.quotationPrefix||'QTN'}-${String(ensureArr(settings.quotations).length+1).padStart(3,'0')}`,status:'draft',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    updSettings(prev=>({...prev,quotations:[next,...ensureArr(prev.quotations)]}));
    show('Quotation duplicated');
  };
  const totalDraft=quotationTotal(form);
  return <div className="space-4 fade-in">
    <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start',flexWrap:'wrap'}}>
      <div>
        <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22}}>Quotation Maker</h2>
        <p style={{fontSize:13,color:'var(--text3)',marginTop:4,maxWidth:720}}>Create standalone quotations without adding a client. Export the premium PDF or email it directly to the prospect with the quote attached.</p>
      </div>
      <button className="btn btn-primary" onClick={()=>{setForm(blankQuote());setModal({});}}><Icon n="plus" s={14}/> New Quotation</button>
    </div>
    <div className="grid-4">
      {[['Total Quotes',String(quotes.length),'note'],['Drafts',String(quotes.filter(q=>(q.status||'draft')==='draft').length),'edit'],['Sent',String(quotes.filter(q=>(q.status||'')==='sent').length),'mail'],['Quoted Value',curr(quotes.reduce((a,q)=>a+quotationTotal(q),0)),'dollar']].map(([label,value,icon])=><div key={label} className="card card-sm" style={{textAlign:'center'}}><Icon n={icon} s={20}/><div style={{fontSize:12,color:'var(--text3)',marginTop:6}}>{label}</div><div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20}}>{value}</div></div>)}
    </div>
    {quotes.length===0?<EmptyState icon="🧾" text="No quotations yet. Create your first quote from the button above."/>:
      <div className="space-3">{quotes.map(q=><div key={q.id} className="card card-sm">
        <div style={{display:'flex',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <div style={{minWidth:0}}>
            <div style={{fontWeight:800,fontSize:15}}>{q.number} · {q.title}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>{q.clientName}{q.companyName?` · ${q.companyName}`:''} · {q.email}{q.phone?` · ${q.phone}`:''}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>Value {curr(quotationTotal(q))}{q.validUntil?` · Valid until ${fmt(q.validUntil)}`:''}</div>
          </div>
          <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
            <Badge bg="rgba(255,255,255,.10)" text="#e5e7eb">{q.status||'draft'}</Badge>
            <button className="btn btn-secondary btn-sm" onClick={()=>downloadQuotationPDF(q,settings)}><Icon n="download" s={12}/> PDF</button>
            <button className="btn btn-secondary btn-sm" onClick={async()=>{const ok=await sendQuotationEmail(q,settings);if(ok)updSettings(prev=>({...prev,quotations:ensureArr(prev.quotations).map(x=>x.id===q.id?{...x,status:'sent',sentAt:new Date().toISOString()}:x)}));}}><Icon n="mail" s={12}/> Email</button>
